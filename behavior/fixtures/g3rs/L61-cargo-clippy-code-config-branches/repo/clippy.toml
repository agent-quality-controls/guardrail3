too-many-lines-threshold = 75
cognitive-complexity-threshold = 15
too-many-arguments-threshold = 7
type-complexity-threshold = 75
max-struct-bools = 3
max-fn-params-bools = 3
excessive-nesting-threshold = 4

avoid-breaking-exported-api = true

allow-dbg-in-tests = false
allow-expect-in-tests = true
allow-panic-in-tests = false
allow-print-in-tests = false
allow-unwrap-in-tests = false

disallowed-methods = [
  "std::env::var",
  { path = "std::env::var", reason = "Use centralized config" },
  { path = "std::env::vars", reason = "Use centralized config" },
  { path = "std::env::set_var", reason = "No env mutation" },
  { path = "std::env::remove_var", reason = "No env mutation" },
  { path = "std::process::exit", reason = "Return errors" },
  { path = "std::process::abort", reason = "Return errors" },
  { path = "std::process::Command::new", reason = "No shell execution" },
  { path = "std::thread::sleep", reason = "Use async time" },
  { path = "std::fs::read_to_string", reason = "Use filesystem facade" },
  { path = "std::fs::read", reason = "Use filesystem facade" },
  { path = "std::fs::read_dir", reason = "Use filesystem facade" },
  { path = "std::fs::read_link", reason = "Use filesystem facade" },
  { path = "std::fs::write", reason = "Use filesystem facade" },
  { path = "std::fs::remove_file", reason = "Use filesystem facade" },
  { path = "std::fs::remove_dir_all", reason = "Use filesystem facade" },
  { path = "std::fs::create_dir_all", reason = "Use filesystem facade" },
  { path = "std::fs::rename", reason = "Use filesystem facade" },
  { path = "std::fs::copy", reason = "Use filesystem facade" },
  { path = "std::fs::metadata", reason = "Use filesystem facade" },
  { path = "std::fs::symlink_metadata", reason = "Use filesystem facade" },
  { path = "std::fs::canonicalize", reason = "Use filesystem facade" },
  { path = "std::fs::set_permissions", reason = "Use filesystem facade" },
  { path = "std::fs::hard_link", reason = "Use filesystem facade" },
  { path = "reqwest::Client::new", reason = "Use injected client" },
  { path = "reqwest::Client::builder", reason = "Use injected client" },
]

disallowed-types = [
  { path = "std::collections::HashMap", reason = "Use deterministic maps" },
  { path = "std::collections::HashSet", reason = "Use deterministic sets" },
  { path = "std::sync::Mutex", reason = "Use parking_lot" },
  { path = "std::sync::RwLock", reason = "Use parking_lot" },
  { path = "std::fs::File", reason = "Use filesystem facade" },
  { path = "std::sync::LazyLock", reason = "No library global state" },
  { path = "std::sync::OnceLock", reason = "No library global state" },
  { path = "once_cell::sync::Lazy", reason = "No library global state" },
]

disallowed-macros = [
  "std::println",
  { path = "std::println", reason = "Use structured logging" },
  { path = "std::eprintln", reason = "Use structured logging" },
  { path = "std::dbg", reason = "Remove debug probes" },
  { path = "std::todo", reason = "No unfinished control flow" },
]
