id = "release-R20-semver-tool-missing"
tool = "g3rs"
run_from = "repo"
commands = [
  ["validate", "workspace", "--path", ".", "--family", "release", "--rules-only", "--inventory"],
]
expected_exit = "zero"
level = "family_rule_breakage"
runner_mode = "path_without_delegated_tools"
blocked_cargo_subcommands = ["semver-checks"]

rule_family = "release"
target_rules = [
  "g3rs-release/semver-checks-installed",
]
expected_findings = [
  "g3rs-release/semver-checks-installed",
]
