too-many-lines-threshold = 76
cognitive-complexity-threshold = 16
too-many-arguments-threshold = 8
type-complexity-threshold = 76
max-struct-bools = 4
max-fn-params-bools = 4
excessive-nesting-threshold = 5
avoid-breaking-exported-api = true
allow-dbg-in-tests = true
allow-expect-in-tests = false
allow-panic-in-tests = true
allow-print-in-tests = true
allow-unwrap-in-tests = true

disallowed-methods = [
  { path = "std::env::var", reason = "Use the centralized config module instead of direct environment reads." },
  { path = "std::env::var_os", reason = "Use the centralized config module instead of direct environment reads." },
  { path = "std::env::vars", reason = "Use the centralized config module instead of direct environment reads." },
  { path = "std::env::set_var", reason = "Environment mutation is unsafe in multi-threaded processes." },
  { path = "std::env::remove_var", reason = "Environment mutation is unsafe in multi-threaded processes." },
  { path = "std::process::exit", reason = "Return Result from main so destructors and shutdown handlers run." },
  { path = "std::process::abort", reason = "Return an error or panic instead of aborting the process." },
  { path = "std::process::Command::new", reason = "Shell execution must go through an explicitly reviewed process boundary." },
  { path = "std::thread::sleep", reason = "Use async-aware sleeping through the runtime boundary." },
  { path = "std::fs::read_to_string", reason = "Route filesystem reads through the centralized filesystem boundary." },
  { path = "std::fs::read", reason = "Route filesystem reads through the centralized filesystem boundary." },
  { path = "std::fs::read_dir", reason = "Route directory reads through the centralized filesystem boundary." },
  { path = "std::fs::read_link", reason = "Route link reads through the centralized filesystem boundary." },
  { path = "std::fs::write", reason = "Route filesystem writes through the centralized filesystem boundary." },
  { path = "std::fs::remove_file", reason = "Route destructive filesystem operations through the centralized boundary." },
  { path = "std::fs::remove_dir_all", reason = "Route destructive filesystem operations through the centralized boundary." },
  { path = "std::fs::create_dir_all", reason = "Route directory creation through the centralized filesystem boundary." },
  { path = "std::fs::rename", reason = "Route filesystem moves through the centralized filesystem boundary." },
  { path = "std::fs::copy", reason = "Route filesystem copies through the centralized filesystem boundary." },
  { path = "std::fs::metadata", reason = "Route metadata reads through the centralized filesystem boundary." },
  { path = "std::fs::symlink_metadata", reason = "Route metadata reads through the centralized filesystem boundary." },
  { path = "std::fs::canonicalize", reason = "Route path normalization through the centralized filesystem boundary." },
  { path = "std::fs::set_permissions", reason = "Route permission changes through the centralized filesystem boundary." },
  { path = "std::fs::hard_link", reason = "Route hard-link creation through the centralized filesystem boundary." },
  { path = "reqwest::Client::new", reason = "Inject a shared HTTP client so connection pooling is preserved." },
  { path = "reqwest::Client::builder", reason = "Construct HTTP clients at startup and inject them through state." },
]

disallowed-types = [
  { path = "std::collections::HashMap", reason = "Use BTreeMap for deterministic iteration order." },
  { path = "std::collections::HashSet", reason = "Use BTreeSet for deterministic iteration order." },
  { path = "std::sync::Mutex", reason = "Use parking_lot::Mutex for non-poisoning synchronization." },
  { path = "std::sync::RwLock", reason = "Use parking_lot::RwLock for non-poisoning synchronization." },
  { path = "std::fs::File", reason = "Route file handle construction through the centralized filesystem boundary." },
  { path = "std::any::Any", reason = "Do not erase types across package boundaries." },
  { path = "std::sync::LazyLock", reason = "Library profile must not rely on process-global state." },
  { path = "std::sync::OnceLock", reason = "Library profile must not rely on process-global state." },
  { path = "once_cell::sync::Lazy", reason = "Library profile must not rely on process-global state." },
  { path = "once_cell::sync::OnceCell", reason = "Library profile must not rely on process-global state." },
]

disallowed-macros = [
  { path = "std::println", reason = "Use structured logging or explicit output helpers." },
  { path = "std::eprintln", reason = "Use structured logging or explicit error reporting." },
  { path = "std::dbg", reason = "Remove debugging probes before commit." },
  { path = "std::todo", reason = "Ship concrete code or explicit errors instead of todo markers." },
  { path = "std::unimplemented", reason = "Ship concrete code or explicit errors instead of unimplemented markers." },
]
