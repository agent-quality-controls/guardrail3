[package]
name = "release_fixture"
version = "0.1.0"
edition = "2024"
publish = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "release_fixture"
path = "src/main.rs"

[dependencies]
private_dep = { path = "crates/private_dep" }
pub_dep = { path = "crates/pub_dep", version = "0.2.0" }
outside_dep = { path = "../outside_dep", version = "0.1.0" }

[workspace]
members = [
  "crates/missing_publish",
  "crates/no_heading_readme",
  "crates/private_dep",
  "crates/pub_dep",
  "crates/too_many_keywords",
]
resolver = "2"
