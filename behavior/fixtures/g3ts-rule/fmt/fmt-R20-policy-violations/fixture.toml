id = "fmt-R20-policy-violations"
tool = "g3ts"
run_from = "repo"
commands = [
  ["validate", "workspace", "--path", ".", "--family", "fmt", "--rules-only", "--inventory"],
]
expected_exit = "nonzero"
level = "family_rule_policy"

rule_family = "fmt"
target_rules = [
  "g3ts-fmt/prettier-package-present",
  "g3ts-fmt/prettier-config-present",
  "g3ts-fmt/format-scripts",
  "g3ts-fmt/format-check-fail-closed",
  "g3ts-fmt/syncpack-prettier-pin"
]
expected_findings = [
  "g3ts-fmt/prettier-package-present",
  "g3ts-fmt/prettier-config-present",
  "g3ts-fmt/format-scripts",
  "g3ts-fmt/format-check-fail-closed",
  "g3ts-fmt/syncpack-prettier-pin"
]
