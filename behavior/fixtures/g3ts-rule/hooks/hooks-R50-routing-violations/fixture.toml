id = "hooks-R50-routing-violations"
tool = "g3ts"
run_from = "repo"
commands = [
  ["validate", "workspace", "--path", ".", "--family", "hooks", "--rules-only", "--inventory"],
]
expected_exit = "nonzero"
level = "family_rule_source"
git_init = true

rule_family = "hooks"
target_rules = [
  "g3ts-hooks/routing-scope-not-hardcoded-literal",
  "g3ts-hooks/routing-no-env-override",
  "g3ts-hooks/routing-no-upward-walk-from-units"
]
expected_findings = [
  "g3ts-hooks/routing-scope-not-hardcoded-literal",
  "g3ts-hooks/routing-no-env-override",
  "g3ts-hooks/routing-no-upward-walk-from-units"
]
