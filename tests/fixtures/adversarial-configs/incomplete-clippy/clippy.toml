too-many-lines-threshold = 75
cognitive-complexity-threshold = 15
too-many-arguments-threshold = 7
type-complexity-threshold = 75
max-struct-bools = 3

# Only one method ban (missing ~30 others)
disallowed-methods = [
    { path = "std::env::var", reason = "banned" },
]

# Only one type ban (missing ~8 others)
disallowed-types = [
    { path = "std::collections::HashMap", reason = "banned" },
]
