# =============================================================================
# deny.toml -- GENERATED by guardrail3 (profile: minimal)
# DO NOT EDIT -- regenerate with: guardrail3 generate
# =============================================================================

[graph]
all-features = true
no-default-features = false

# ============================================================
# DEPENDENCY BANS
# ============================================================
[bans]
multiple-versions = "deny"
# Workspace path dependencies (e.g., domain = { path = "../domain" }) have no version spec.
# cargo-deny 0.19+ flags these as wildcards. Allow them.
wildcards = "allow"
allow-wildcard-paths = true
highlight = "all"

skip = [
    { crate = "windows-sys@0.59.0", reason = "colored 2.2 pins 0.59, clap/walkdir use 0.61" },
]

deny = [
    # --- Local overrides ---
# Additional [bans] deny entries for deny.toml
# Example:
#     { name = "some-crate", wrappers = [] },

]


# ============================================================
# LICENSE CHECKING
# ============================================================
[licenses]
# All licenses are denied unless explicitly listed here
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Workspace crates with `publish = false` don't need a license field
[licenses.private]
ignore = true

# ============================================================
# SECURITY ADVISORY CHECKING
# ============================================================
[advisories]
# unmaintained: check workspace deps only (transitive unmaintained crates are not actionable)
unmaintained = "workspace"
yanked = "warn" # EXCEPTION: yanked crates in transitive deps are not actionable -- warn instead of deny
ignore = []

# ============================================================
# SOURCE RESTRICTIONS
# ============================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
