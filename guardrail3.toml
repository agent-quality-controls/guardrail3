version = "0.1"

[profile]
name = "service"

[rust]
workspace_root = "apps/guardrail3"
excluded_paths = ["tests/fixtures", "tests/snapshots", "legacy"]

[rust.checks]
fmt = true
toolchain = true
clippy = true
deny = true
cargo = true
code = true
hexarch = true
deps = true
garde = true
test = true
release = true
hooks_shared = true
hooks_rs = true

[rust.apps.guardrail3]
type = "service"

[rust.packages]
type = "library"

[rust.packages.checks]
hexarch = false
garde = false
test = true
release = false
hooks_shared = false
hooks_rs = false

[rust.packages.deps]
allowed_deps = ["serde", "toml"]

# ── Escape hatches ──────────────────────────────────────────────────────

# apps/guardrail3 workspace lint allows
[[escape_hatches]]
family = "cargo"
file = "apps/guardrail3/Cargo.toml"
kind = "lint_allow"
selector = "clippy:redundant_pub_crate"
reason = "Conflicts with rustc unreachable_pub — clippy#5369"

# Parser crate workspace lint allows
