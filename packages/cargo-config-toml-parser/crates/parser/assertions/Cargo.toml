[package]
name = "cargo-config-toml-parser-runtime-assertions"
version = "0.0.0"
edition = "2024"
description = "Assertion helpers for cargo-config-toml parser tests"
license.workspace = true
repository.workspace = true
publish = true
readme = "README.md"
keywords = ["cargo", "config", "toml", "assertions", "rust"]
categories = ["config", "development-tools", "parser-implementations"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[dependencies]
cargo-config-toml-parser-runtime = { path = "../runtime" }
