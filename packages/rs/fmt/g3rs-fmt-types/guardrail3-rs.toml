profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "rust-toolchain-toml-parser",
  "rustfmt-toml-parser",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
file = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Shared fmt type names intentionally repeat the family and rule context."
