[package]
name = "g3rs-fmt-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs fmt ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "fmt", "ingestion", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
g3rs-fmt-types = { path = "../../../g3rs-fmt-types", version = "0.1.0" }
g3rs-fmt-ingestion-types = { path = "../types", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0", default-features = false, features = ["types"] }
rust-toolchain-toml-parser = { path = "../../../../../parsers/rust-toolchain-toml-parser", version = "0.1.0" }
rustfmt-toml-parser = { path = "../../../../../parsers/rustfmt-toml-parser", version = "0.1.0" }

[dev-dependencies]
g3rs-fmt-config-checks = { path = "../../../g3rs-fmt-config-checks" }
g3rs-fmt-ingestion-assertions = { path = "../assertions" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0", features = ["runtime"] }
tempfile = "3"
