[package]
name = "g3rs-topology-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs topology ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "topology", "ingestion", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
g3rs-topology-ingestion-types = { path = "../types", version = "0.1.0" }
g3rs-topology-types = { path = "../../../g3rs-topology-types", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0", default-features = false, features = ["api"] }

[dev-dependencies]
g3rs-topology-file-tree-checks = { path = "../../../g3rs-topology-file-tree-checks", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0", features = ["runtime"] }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
tempfile = "3"
