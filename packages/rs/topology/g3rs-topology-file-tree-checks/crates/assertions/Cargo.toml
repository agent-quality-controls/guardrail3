[package]
name = "g3rs-topology-file-tree-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertions for g3rs topology file-tree checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "topology", "file-tree", "checks", "assertions"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["assertions"]
assertions = []

[lints]
workspace = true

[dependencies]
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
