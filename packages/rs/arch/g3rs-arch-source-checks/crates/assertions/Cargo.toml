[package]
name = "g3rs-arch-source-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Test assertions for g3rs arch source checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "arch", "source", "checks", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[package.metadata.guardrail3]
shared = true

[lints]
workspace = true

[dependencies]
g3rs-arch-source-checks-runtime = { path = "../runtime", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
