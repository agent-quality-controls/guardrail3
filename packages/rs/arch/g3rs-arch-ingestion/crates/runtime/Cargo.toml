[package]
name = "g3rs-arch-ingestion-runtime"
version.workspace = true
edition.workspace = true
description = "Runtime implementation for g3rs arch ingestion"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
readme = "README.md"
keywords = ["guardrail3", "arch", "ingestion", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[package.metadata.guardrail3]
shared = true

[lints]
workspace = true

[dependencies]
g3rs-arch-types = { path = "../../../g3rs-arch-types", version = "0.1.0" }
g3-workspace-crawl = { path = "../../../../../shared/g3-workspace-crawl", version = "0.1.0", default-features = false, features = ["api"] }
glob = "0.3"
g3rs-toml-parser = { path = "../../../../../parsers/g3rs-toml-parser", version = "0.1.0", default-features = false, features = ["api"] }
proc-macro2 = { version = "1", features = ["span-locations"] }
syn = { version = "2", features = ["full", "parsing"] }
toml = "0.8"

[dev-dependencies]
g3rs-arch-config-checks = { path = "../../../g3rs-arch-config-checks", version = "0.1.0" }
g3rs-arch-file-tree-checks = { path = "../../../g3rs-arch-file-tree-checks", version = "0.1.0" }
g3rs-arch-ingestion-assertions = { path = "../assertions" }
g3rs-arch-source-checks = { path = "../../../g3rs-arch-source-checks", version = "0.1.0" }
g3-workspace-crawl = { path = "../../../../../shared/g3-workspace-crawl", version = "0.1.0", features = ["runtime"] }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
tempfile = "3"
