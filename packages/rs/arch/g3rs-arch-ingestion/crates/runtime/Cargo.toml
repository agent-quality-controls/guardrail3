[package]
name = "g3rs-arch-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs arch ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "arch", "ingestion", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[dependencies]
g3rs-arch-ingestion-types = { path = "../types", version = "0.1.0" }
g3rs-arch-types = { path = "../../../g3rs-arch-types", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0", default-features = false, features = ["types"] }
glob = "0.3"
proc-macro2 = { version = "1", features = ["span-locations"] }
syn = { version = "2", features = ["full", "parsing"] }
toml = "0.8"

[dev-dependencies]
g3rs-arch-config-checks = { path = "../../../g3rs-arch-config-checks", version = "0.1.0" }
g3rs-arch-file-tree-checks = { path = "../../../g3rs-arch-file-tree-checks", version = "0.1.0" }
g3rs-arch-ingestion-assertions = { path = "../assertions" }
g3rs-arch-source-checks = { path = "../../../g3rs-arch-source-checks", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0", features = ["runtime"] }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
tempfile = "3"
