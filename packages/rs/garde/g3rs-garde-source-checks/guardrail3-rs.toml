profile = "library"

allowed_deps = [
  "g3rs-garde-types",
  "guardrail3-check-types",
  "guardrail3-reason-policy",
  "proc-macro2",
  "quote",
  "syn",
  "guardrail3-rs-toml-parser",
  "tempfile",
]

[checks]
garde = false

[[waivers]]
rule = "RS-ARCH-FILETREE-07"
file = "crates/runtime/Cargo.toml"
selector = "structural-split"
reason = "Runtime crate intentionally keeps one source rule per module and owns the garde AST analysis surface."

[[waivers]]
rule = "RS-ARCH-FILETREE-07"
file = "crates/assertions/Cargo.toml"
selector = "structural-split"
reason = "Assertions crate intentionally keeps one shared proof module per source rule so internal and external tests use the same proof surface."
