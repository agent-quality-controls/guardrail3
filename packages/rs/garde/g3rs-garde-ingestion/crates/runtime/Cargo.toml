[package]
name = "g3rs-garde-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs garde ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "garde", "ingestion", "rust"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
clippy-toml-parser = { path = "../../../../../parsers/clippy-toml-parser", version = "0.1.0" }
guardrail3-rs-toml-parser = { path = "../../../../../parsers/guardrail3-rs-toml-parser", version = "0.1.0" }
g3rs-garde-source-checks-types = { path = "../../../g3rs-garde-source-checks/crates/types", version = "0.1.0" }
g3rs-garde-types = { path = "../../../g3rs-garde-types", version = "0.1.0" }
g3rs-garde-ingestion-types = { path = "../types", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0" }

[dev-dependencies]
g3rs-garde-source-checks = { path = "../../../g3rs-garde-source-checks" }
g3rs-garde-config-checks = { path = "../../../g3rs-garde-config-checks" }
g3rs-garde-ingestion-assertions = { path = "../assertions" }
tempfile = "3"
