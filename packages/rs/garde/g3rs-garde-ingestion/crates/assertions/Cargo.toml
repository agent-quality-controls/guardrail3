[package]
name = "g3rs-garde-ingestion-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertion helpers for g3rs garde ingestion tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "garde", "ingestion", "assertions"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[lints]
workspace = true

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[package.metadata.guardrail3]
shared = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
g3rs-garde-config-checks-assertions = { path = "../../../g3rs-garde-config-checks/crates/assertions", version = "0.1.0" }
g3rs-garde-ingestion-runtime = { path = "../runtime", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
