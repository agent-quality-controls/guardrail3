profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "clippy-toml-parser",
  "g3rs-garde-config-checks",
  "g3rs-garde-config-checks-assertions",
  "g3rs-garde-source-checks",
  "g3rs-garde-source-checks-types",
  "g3rs-garde-types",
  "guardrail3-check-types",
  "g3rs-workspace-crawl",
  "guardrail3-rs-toml-parser",
  "tempfile",
]

[checks]
garde = false

[[waivers]]
rule = "RS-ARCH-FILETREE-07"
file = "crates/runtime/Cargo.toml"
selector = "structural-split"
reason = "Runtime crate intentionally owns the ingestion pipeline and its close sidecars."
