[package]
name = "g3rs-garde-config-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Result assertion helpers for g3 garde config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "garde", "checks", "rust", "tests"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-garde-config-checks-runtime = { path = "../runtime", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
