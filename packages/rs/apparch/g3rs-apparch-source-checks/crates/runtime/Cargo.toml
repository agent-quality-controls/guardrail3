[package]
name = "g3rs-apparch-source-checks-runtime"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
description = "Runtime implementation for g3rs apparch source checks"
readme = "README.md"
keywords = ["guardrail3", "apparch", "source", "checks", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-apparch-types = { path = "../../../g3rs-apparch-types" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types" }

[dev-dependencies]
g3rs-apparch-source-checks-assertions = { path = "../assertions" }

[lints]
workspace = true
