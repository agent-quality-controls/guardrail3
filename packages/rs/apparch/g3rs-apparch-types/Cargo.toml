[package]
name = "g3rs-apparch-types"
version = "0.1.0"
edition = "2024"
description = "Shared types for g3rs apparch family"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
keywords = ["guardrail3", "apparch", "types", "rust"]
categories = ["development-tools"]

[package.metadata.guardrail3]
shared = true

[dependencies]
guardrail3-rs-toml-parser = { path = "../../../parsers/guardrail3-rs-toml-parser", features = ["api"] }

[lints.rust]
warnings = "deny"
unsafe_code = "forbid"
dead_code = "deny"
unused_results = "deny"
unused_crate_dependencies = "deny"
missing_debug_implementations = "deny"
unreachable_pub = "deny"

[lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
cargo = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
module_name_repetitions = "allow"
