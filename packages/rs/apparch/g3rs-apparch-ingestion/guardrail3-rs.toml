profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "g3rs-apparch-config-checks",
  "g3rs-apparch-ingestion-assertions",
  "g3rs-apparch-ingestion-runtime",
  "g3rs-apparch-source-checks",
  "g3rs-apparch-types",
  "g3rs-workspace-crawl",
  "glob",
  "guardrail3-check-types",
  "guardrail3-rs-toml-parser",
  "syn",
  "tempfile",
]

[checks]
garde = false

[[waivers]]
rule = "RS-ARCH-FILETREE-07"
file = "crates/runtime/Cargo.toml"
selector = "structural-split"
reason = "Runtime crate intentionally keeps ingestion flow split across focused modules."

[[waivers]]
rule = "RS-ARCH-FILETREE-07"
file = "crates/assertions/Cargo.toml"
selector = "structural-split"
reason = "Assertions crate intentionally keeps shared proof helpers in dedicated modules."
