[package]
name = "g3rs-apparch-config-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs apparch config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "apparch", "config", "checks", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-apparch-types = { path = "../../../g3rs-apparch-types" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types" }
guardrail3-reason-policy = { path = "../../../../../shared/reason-policy", version = "0.0.0" }

[dev-dependencies]
g3rs-apparch-config-checks-assertions = { path = "../assertions" }
g3rs-toml-parser = { path = "../../../../../parsers/g3rs-toml-parser", features = ["api"] }

[lints]
workspace = true
