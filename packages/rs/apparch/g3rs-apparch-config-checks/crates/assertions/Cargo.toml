[package]
name = "g3rs-apparch-config-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertion helpers for g3rs apparch config checks tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "apparch", "config", "checks", "assertions"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-apparch-config-checks-runtime = { path = "../runtime", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }

[lints]
workspace = true
