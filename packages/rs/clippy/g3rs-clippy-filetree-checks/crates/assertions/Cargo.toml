[package]
name = "g3rs-clippy-filetree-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertions for g3 clippy filetree checks tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
publish = false

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[dependencies]
g3rs-clippy-filetree-checks-runtime = { path = "../runtime", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
