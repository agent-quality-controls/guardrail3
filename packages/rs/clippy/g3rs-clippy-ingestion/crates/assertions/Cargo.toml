[package]
name = "g3rs-clippy-ingestion-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertion helpers for g3rs clippy ingestion tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "clippy", "ingestion", "assertions"]
categories = ["development-tools"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-clippy-ingestion-types = { path = "../types" }
