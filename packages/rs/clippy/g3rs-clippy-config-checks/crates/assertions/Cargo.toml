[package]
name = "g3rs-clippy-config-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertion helpers for g3 clippy config checks tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "clippy", "checks", "assertions"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true

[dependencies]
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
