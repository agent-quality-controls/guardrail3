[package]
name = "g3rs-clippy-config-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3 clippy config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "clippy", "checks", "runtime"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
clippy-toml-parser = { path = "../../../../../parsers/clippy-toml-parser", version = "0.1.0" }
guardrail3-rs-toml-parser = { path = "../../../../../parsers/guardrail3-rs-toml-parser", version = "0.1.0" }
g3rs-clippy-types = { path = "../../../g3rs-clippy-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
toml = "0.8"

[dev-dependencies]
g3rs-clippy-config-checks-assertions = { path = "../assertions", version = "0.1.0" }
test_support = { path = "../test_support", version = "0.1.0" }
