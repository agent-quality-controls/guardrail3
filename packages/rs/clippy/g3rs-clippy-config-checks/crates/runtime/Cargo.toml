[package]
name = "g3rs-clippy-config-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3 clippy config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
clippy-toml-parser = { path = "../../../../../parsers/clippy-toml-parser" }
g3rs-clippy-config-checks-types = { path = "../types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
guardrail3-domain-modules = { path = "../../../../../../apps/guardrail3/crates/domain/modules" }
toml = "0.8"

[dev-dependencies]
g3rs-clippy-config-checks-assertions = { path = "../assertions" }
