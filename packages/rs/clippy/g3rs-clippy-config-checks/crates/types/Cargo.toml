[package]
name = "g3rs-clippy-config-checks-types"
version = "0.1.0"
edition = "2024"
description = "Public contract types for g3 clippy config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "clippy", "checks", "types"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[features]
default = ["api"]
api = []

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-clippy-types = { path = "../../../g3rs-clippy-types", version = "0.1.0" }
