[package]
name = "g3rs-hexarch-source-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs hexarch source checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "hexarch", "source", "checks", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
g3rs-hexarch-source-checks-types = { path = "../types", version = "0.1.0" }
g3rs-hexarch-types = { path = "../../../g3rs-hexarch-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }

[dev-dependencies]
g3rs-hexarch-source-checks-assertions = { path = "../assertions" }
