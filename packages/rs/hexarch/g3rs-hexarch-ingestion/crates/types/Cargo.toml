[package]
name = "g3rs-hexarch-ingestion-types"
version = "0.1.0"
edition = "2024"
description = "Public types for g3rs hexarch ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "hexarch", "ingestion", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["api"]
api = []

[lints]
workspace = true

[dependencies]
g3rs-hexarch-source-checks-types = { path = "../../../g3rs-hexarch-source-checks/crates/types", version = "0.1.0" }
g3rs-hexarch-types = { path = "../../../g3rs-hexarch-types", version = "0.1.0" }
