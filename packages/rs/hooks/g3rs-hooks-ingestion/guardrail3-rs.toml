profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "g3rs-clippy-config-checks",
  "g3rs-clippy-ingestion",
  "g3rs-code-ingestion",
  "g3rs-code-source-checks",
  "g3rs-hooks-config-checks",
  "g3rs-hooks-config-checks-types",
  "g3rs-hooks-file-tree-checks",
  "g3rs-hooks-file-tree-checks-types",
  "g3rs-hooks-source-checks",
  "g3rs-hooks-types",
  "g3rs-workspace-crawl",
  "guardrail3-check-types",
  "hook-shell-parser",
  "tempfile",
]

[checks]
hooks = false

[[waivers]]
rule = "g3rs-arch/structural-split"
file = "crates/runtime/Cargo.toml"
selector = "structural-split"
reason = "Runtime crate intentionally owns the ingestion pipeline and its close sidecars."
