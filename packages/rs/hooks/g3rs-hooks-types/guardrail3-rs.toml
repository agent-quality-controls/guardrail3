profile = "library"

allowed_deps = [
  "g3rs-hooks-contract-types",
  "hook-shell-parser",
  "serde",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
file = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Shared hooks type names intentionally repeat the family context."
