profile = "library"

allowed_deps = [
  "g3rs-test-types",
  "guardrail3-check-types",
  "guardrail3-reason-policy",
  "proc-macro2",
  "syn",
]

[[waivers]]
rule = "multiple_crate_versions"
file = "Cargo.toml"
selector = "lint:clippy::multiple_crate_versions"
reason = "This internal workspace package intentionally depends on parser crates and shared internal crates with overlapping transitive versions."

[[waivers]]
rule = "RS-ARCH-FILETREE-07"
file = "crates/runtime/Cargo.toml"
selector = "structural-split"
reason = "Runtime intentionally groups source parsing and per-rule checks into dedicated submodules."

[[waivers]]
rule = "RS-ARCH-FILETREE-07"
file = "crates/assertions/Cargo.toml"
selector = "structural-split"
reason = "Assertions intentionally keep one shared proof module per source rule."
