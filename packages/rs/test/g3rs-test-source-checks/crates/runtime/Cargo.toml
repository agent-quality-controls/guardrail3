[package]
name = "g3rs-test-source-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs test source checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "test", "source", "checks", "rust"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-test-types = { path = "../../../g3rs-test-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0", features = ["types"] }
guardrail3-reason-policy = { path = "../../../../../shared/reason-policy", version = "0.0.0" }
