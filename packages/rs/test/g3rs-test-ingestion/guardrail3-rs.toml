profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "g3rs-test-config-checks",
  "g3rs-test-file-tree-checks",
  "g3rs-test-source-checks",
  "g3rs-test-types",
  "g3-workspace-crawl",
  "glob",
  "guardrail3-check-types",
  "hook-shell-parser",
  "mutants-toml-parser",
  "nextest-toml-parser",
  "proc-macro2",
  "syn",
]

[[waivers]]
rule = "multiple_crate_versions"
subject = "Cargo.toml"
selector = "lint:clippy::multiple_crate_versions"
reason = "This internal workspace package intentionally depends on parser crates and shared internal crates with overlapping transitive versions."
