[package]
name = "g3rs-test-config-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertions for g3rs test config checks tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "test", "config", "checks", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
