[package]
name = "g3rs-test-config-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs test config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "test", "config", "checks", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
g3rs-test-config-checks-types = { path = "../types", version = "0.1.0" }
g3rs-test-types = { path = "../../../g3rs-test-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }

[dev-dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
g3rs-test-config-checks-assertions = { path = "../assertions" }
mutants-toml-parser = { path = "../../../../../parsers/mutants-toml-parser", version = "0.1.0" }
nextest-toml-parser = { path = "../../../../../parsers/nextest-toml-parser", version = "0.1.0" }
