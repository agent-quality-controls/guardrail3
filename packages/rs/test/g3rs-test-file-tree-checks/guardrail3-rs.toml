profile = "library"

allowed_deps = [
  "g3rs-test-ingestion-runtime",
  "g3rs-test-types",
  "guardrail3-check-types",
]

[[waivers]]
rule = "multiple_crate_versions"
subject = "Cargo.toml"
selector = "lint:clippy::multiple_crate_versions"
reason = "This internal workspace package intentionally depends on parser crates and shared internal crates with overlapping transitive versions."
