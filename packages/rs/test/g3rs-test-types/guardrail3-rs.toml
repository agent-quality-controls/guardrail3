profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "mutants-toml-parser",
  "nextest-toml-parser",
]

[checks]
garde = false

[[waivers]]
rule = "RS-CARGO-CONFIG-07"
file = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Shared test type names intentionally repeat the family context."
