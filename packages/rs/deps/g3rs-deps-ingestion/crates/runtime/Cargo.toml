[package]
name = "g3rs-deps-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs deps ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
keywords = ["guardrail3", "deps", "ingestion", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
g3rs-deps-ingestion-types = { path = "../types", version = "0.1.0" }
g3rs-deps-types = { path = "../../../g3rs-deps-types", version = "0.1.0" }
g3-workspace-crawl = { path = "../../../../../shared/g3-workspace-crawl", version = "0.1.0" }
glob = "0.3.3"
g3rs-toml-parser = { path = "../../../../../parsers/g3rs-toml-parser", version = "0.1.0" }
toml = "0.8"

[dev-dependencies]
g3rs-deps-config-checks = { path = "../../../g3rs-deps-config-checks" }
g3rs-deps-filetree-checks = { path = "../../../g3rs-deps-filetree-checks" }
g3rs-deps-ingestion-assertions = { path = "../assertions" }
tempfile = "3"
