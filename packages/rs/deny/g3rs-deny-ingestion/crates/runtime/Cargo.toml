[package]
name = "g3rs-deny-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs deny ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "deny", "ingestion", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[dependencies]
deny-toml-parser = { path = "../../../../../parsers/deny-toml-parser", version = "0.1.0" }
g3rs-deny-types = { path = "../../../g3rs-deny-types", version = "0.1.0" }
g3rs-deny-ingestion-types = { path = "../types", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0" }
guardrail3-rs-toml-parser = { path = "../../../../../parsers/guardrail3-rs-toml-parser", version = "0.1.0" }

[dev-dependencies]
g3rs-deny-config-checks = { path = "../../../g3rs-deny-config-checks" }
g3rs-deny-filetree-checks = { path = "../../../g3rs-deny-filetree-checks" }
g3rs-deny-ingestion-assertions = { path = "../assertions" }
tempfile = "3"
