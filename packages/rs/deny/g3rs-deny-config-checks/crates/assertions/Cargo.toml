[package]
name = "g3rs-deny-config-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertion helpers for g3 deny config checks tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "deny", "checks", "rust", "policy"]
categories = ["development-tools"]
publish = false

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-deny-config-checks-runtime = { path = "../runtime" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
