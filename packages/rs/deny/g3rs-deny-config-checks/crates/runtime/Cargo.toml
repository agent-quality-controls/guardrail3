[package]
name = "g3rs-deny-config-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3 deny config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "deny", "checks", "rust", "policy"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[package.metadata.guardrail3]
shared = true

[lints]
workspace = true

[dependencies]
deny-toml-parser = { path = "../../../../../parsers/deny-toml-parser" }
g3rs-deny-types = { path = "../../../g3rs-deny-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
guardrail3-reason-policy = { path = "../../../../../shared/reason-policy", version = "0.0.0" }
guardrail3-rs-toml-parser = { path = "../../../../../parsers/guardrail3-rs-toml-parser", version = "0.1.0" }
toml = "0.8"

[dev-dependencies]
g3rs-deny-config-checks-assertions = { path = "../assertions" }
test_support = { path = "../test_support" }
