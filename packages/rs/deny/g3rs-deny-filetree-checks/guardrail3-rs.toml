profile = "library"

allowed_deps = [
  "g3rs-deny-filetree-checks-assertions",
  "g3rs-deny-types",
  "guardrail3-check-types",
  "test_support",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-arch/structural-split"
file = "crates/runtime/Cargo.toml"
selector = "structural-split"
reason = "Runtime crate intentionally keeps one deny filetree rule module per file."

[[waivers]]
rule = "g3rs-arch/structural-split"
file = "crates/assertions/Cargo.toml"
selector = "structural-split"
reason = "Assertions crate intentionally keeps one shared proof module per rule."

[[waivers]]
rule = "g3rs-arch/structural-split"
file = "crates/test_support/Cargo.toml"
selector = "structural-split"
reason = "Shared test support crate intentionally holds reusable deny filetree test input builders."
