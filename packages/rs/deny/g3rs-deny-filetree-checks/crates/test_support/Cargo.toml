[package]
name = "test_support"
version = "0.1.0"
edition = "2024"
description = "Shared test input builders for g3rs deny filetree checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "deny", "filetree", "test-support"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[lints]
workspace = true

[features]
default = ["all"]
all = ["support"]
support = []

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-deny-types = { path = "../../../g3rs-deny-types", version = "0.1.0" }
