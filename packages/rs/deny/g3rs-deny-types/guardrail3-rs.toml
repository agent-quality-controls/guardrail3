profile = "library"

allowed_deps = [
  "deny-toml-parser",
  "g3rs-toml-parser",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
file = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Shared deny type names intentionally repeat the family and rule context."
