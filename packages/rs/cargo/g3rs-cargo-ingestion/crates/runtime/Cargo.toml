[package]
name = "g3rs-cargo-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs Cargo ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "cargo", "ingestion", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
g3rs-cargo-types = { path = "../../../g3rs-cargo-types", version = "0.1.0" }
g3rs-cargo-ingestion-types = { path = "../types", version = "0.1.0" }
g3-workspace-crawl = { path = "../../../../../shared/g3-workspace-crawl", version = "0.1.0" }
glob = "0.3"
g3rs-toml-parser = { path = "../../../../../parsers/g3rs-toml-parser", version = "0.1.0" }
toml = "0.8"

