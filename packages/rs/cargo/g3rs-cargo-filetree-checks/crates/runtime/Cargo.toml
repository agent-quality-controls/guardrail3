[package]
name = "g3rs-cargo-filetree-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3 cargo filetree checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[dependencies]
g3rs-cargo-types = { path = "../../../g3rs-cargo-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }

[dev-dependencies]
g3rs-cargo-filetree-checks-assertions = { path = "../assertions", version = "0.1.0" }
