profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "guardrail3-rs-toml-parser",
  "toml",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
file = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Shared cargo type names intentionally repeat the family and rule context."
