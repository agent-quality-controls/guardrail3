[package]
name = "g3rs-release-source-checks-types"
version = "0.1.0"
edition = "2024"
description = "Public types for g3rs release source checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "release", "source", "checks", "rust"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["api"]
api = []

[lints]
workspace = true

[dependencies]
g3rs-release-types = { path = "../../../g3rs-release-types", version = "0.1.0" }

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true
