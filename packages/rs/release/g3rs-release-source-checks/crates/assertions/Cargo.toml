[package]
name = "g3rs-release-source-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertions for g3rs release source checks tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "release", "source", "checks", "tests"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0", features = ["types"] }
g3rs-release-source-checks-runtime = { path = "../runtime", version = "0.1.0", optional = true }

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true
