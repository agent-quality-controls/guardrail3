profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "cliff-toml-parser",
  "release-plz-toml-parser",
  "serde",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Shared release type names intentionally repeat the family context."

[[waivers]]
rule = "g3rs-code/large-type-inventory"
subject = "src/types.rs"
selector = "struct:G3RsReleaseConfigCrate"
reason = "Release config facts intentionally mirror the full normalized crate inventory."

[[waivers]]
rule = "g3rs-code/large-type-inventory"
subject = "src/types.rs"
selector = "struct:G3RsReleaseConfigRepo"
reason = "Release repo facts intentionally mirror the full normalized repo release inventory."
