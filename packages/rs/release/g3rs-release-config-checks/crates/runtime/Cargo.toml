[package]
name = "g3rs-release-config-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs release config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "release", "checks", "rust", "policy"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
cliff-toml-parser = { path = "../../../../../parsers/cliff-toml-parser", version = "0.1.0" }
g3rs-release-config-checks-types = { path = "../types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
release-plz-toml-parser = { path = "../../../../../parsers/release-plz-toml-parser", version = "0.1.0" }
semver = "1"

[dev-dependencies]
g3rs-release-config-checks-assertions = { path = "../assertions" }
