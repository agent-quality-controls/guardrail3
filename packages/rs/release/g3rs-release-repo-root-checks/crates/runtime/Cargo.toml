[package]
name = "g3rs-release-repo-root-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs release repo-root checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "release", "repo-root", "checks", "rust"]
categories = ["development-tools"]
publish = false
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
g3rs-release-types = { path = "../../../g3rs-release-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }

