[package]
name = "g3rs-release-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs release ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "release", "ingestion", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
cliff-toml-parser = { path = "../../../../../parsers/cliff-toml-parser", version = "0.1.0" }
g3rs-release-types = { path = "../../../g3rs-release-types", version = "0.1.0" }
g3rs-release-ingestion-types = { path = "../types", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0" }
glob = "0.3"
release-plz-toml-parser = { path = "../../../../../parsers/release-plz-toml-parser", version = "0.1.0" }
semver = "1"
serde_yaml = "0.9"
toml = "0.8"

[dev-dependencies]
g3rs-release-config-checks = { path = "../../../g3rs-release-config-checks" }
g3rs-release-filetree-checks = { path = "../../../g3rs-release-filetree-checks" }
g3rs-release-ingestion-assertions = { path = "../assertions" }
g3rs-release-source-checks = { path = "../../../g3rs-release-source-checks" }
tempfile = "3"
