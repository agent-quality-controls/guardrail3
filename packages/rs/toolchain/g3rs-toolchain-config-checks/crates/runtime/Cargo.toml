[package]
name = "g3rs-toolchain-config-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3 toolchain config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser" }
g3rs-toolchain-types = { path = "../../../g3rs-toolchain-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
rust-toolchain-toml-parser = { path = "../../../../../parsers/rust-toolchain-toml-parser" }
