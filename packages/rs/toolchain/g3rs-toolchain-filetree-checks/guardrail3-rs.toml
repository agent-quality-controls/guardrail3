profile = "library"

allowed_deps = [
  "g3rs-toolchain-filetree-checks-assertions",
  "g3rs-toolchain-types",
  "guardrail3-check-types",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-arch/structural-split"
file = "crates/runtime/Cargo.toml"
selector = "structural-split"
reason = "Runtime crate intentionally keeps the filetree rules and combined run surface split into focused modules."

[[waivers]]
rule = "g3rs-arch/structural-split"
file = "crates/assertions/Cargo.toml"
selector = "structural-split"
reason = "Assertions crate intentionally keeps one shared proof module per filetree rule plus the combined run proof."
