profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "g3rs-toolchain-config-checks",
  "g3rs-toolchain-config-checks-assertions",
  "g3rs-toolchain-filetree-checks",
  "g3rs-toolchain-filetree-checks-assertions",
  "g3rs-toolchain-ingestion-assertions",
  "g3rs-toolchain-ingestion-runtime",
  "g3rs-toolchain-ingestion-types",
  "g3rs-toolchain-types",
  "g3rs-workspace-crawl",
  "guardrail3-check-types",
  "rust-toolchain-toml-parser",
  "tempfile",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-arch/structural-split"
file = "crates/runtime/Cargo.toml"
selector = "structural-split"
reason = "Runtime crate intentionally keeps toolchain ingestion flow split across focused modules."

[[waivers]]
rule = "g3rs-arch/structural-split"
file = "crates/assertions/Cargo.toml"
selector = "structural-split"
reason = "Assertions crate intentionally keeps shared proof helpers in dedicated modules."

[[waivers]]
rule = "g3rs-arch/structural-split"
file = "crates/types/Cargo.toml"
selector = "structural-split"
reason = "Types crate intentionally keeps the public error contract split from the facade."
