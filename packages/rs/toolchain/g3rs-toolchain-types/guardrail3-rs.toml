profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "rust-toolchain-toml-parser",
  "serde",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-cargo/approved-allow-inventory"
subject = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Shared toolchain type names intentionally repeat the family and rule context."
