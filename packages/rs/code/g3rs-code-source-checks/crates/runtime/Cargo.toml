[package]
name = "g3rs-code-source-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3 code source checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "code", "source", "checks", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
g3rs-code-types = { path = "../../../g3rs-code-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
guardrail3-reason-policy = { path = "../../../../../shared/reason-policy", version = "0.0.0" }
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = "1"
syn = { version = "2", features = ["full", "parsing", "visit"] }

[dev-dependencies]
g3rs-code-source-checks-assertions = { path = "../assertions" }
