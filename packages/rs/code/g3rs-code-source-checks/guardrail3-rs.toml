profile = "library"

allowed_deps = [
  "g3rs-code-source-checks-runtime",
  "g3rs-code-types",
  "guardrail3-check-types",
  "guardrail3-reason-policy",
  "proc-macro2",
  "quote",
  "syn",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-code/too-many-effective-code-lines"
subject = "crates/runtime/src/public_struct_named_fields/rule.rs"
selector = "effective-code-lines"
reason = "This rule owns a large public-field AST resolver; splitting the resolver safely is a dedicated source-rule refactor."
