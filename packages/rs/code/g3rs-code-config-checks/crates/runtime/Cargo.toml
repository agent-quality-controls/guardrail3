[package]
name = "g3rs-code-config-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs code config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "code", "config", "checks", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
g3rs-code-types = { path = "../../../g3rs-code-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }

[dev-dependencies]
g3rs-code-config-checks-assertions = { path = "../assertions" }
