[package]
name = "g3rs-code-ingestion-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertions for g3rs code ingestion tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "code", "ingestion", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
g3rs-code-source-checks-types = { path = "../../../g3rs-code-source-checks/crates/types", version = "0.1.0" }
