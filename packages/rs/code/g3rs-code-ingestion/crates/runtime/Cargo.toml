[package]
name = "g3rs-code-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs code ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "code", "ingestion", "rust"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[dependencies]
cargo-toml-parser = { path = "../../../../../parsers/cargo-toml-parser", version = "0.1.0" }
clippy-toml-parser = { path = "../../../../../parsers/clippy-toml-parser", version = "0.1.0" }
deny-toml-parser = { path = "../../../../../parsers/deny-toml-parser", version = "0.1.0" }
g3rs-code-types = { path = "../../../g3rs-code-types", version = "0.1.0" }
g3rs-code-ingestion-types = { path = "../types", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0", default-features = false, features = ["api"] }
glob = "0.3"
guardrail3-rs-toml-parser = { path = "../../../../../parsers/guardrail3-rs-toml-parser", version = "0.1.0" }
rust-toolchain-toml-parser = { path = "../../../../../parsers/rust-toolchain-toml-parser", version = "0.1.0" }
rustfmt-toml-parser = { path = "../../../../../parsers/rustfmt-toml-parser", version = "0.1.0" }
syn = { version = "2", features = ["full"] }

[dev-dependencies]
g3rs-code-source-checks = { path = "../../../g3rs-code-source-checks", version = "0.1.0" }
g3rs-code-config-checks = { path = "../../../g3rs-code-config-checks", version = "0.1.0" }
g3rs-code-file-tree-checks = { path = "../../../g3rs-code-file-tree-checks", version = "0.1.0" }
g3rs-code-ingestion-assertions = { path = "../assertions" }
g3rs-code-types = { path = "../../../g3rs-code-types", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../../g3rs-workspace-crawl", version = "0.1.0", features = ["runtime"] }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }
tempfile = "3"
