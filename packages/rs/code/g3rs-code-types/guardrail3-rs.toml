profile = "library"

allowed_deps = [
  "cargo-toml-parser",
  "clippy-toml-parser",
  "deny-toml-parser",
  "guardrail3-rs-toml-parser",
  "rust-toolchain-toml-parser",
  "rustfmt-toml-parser",
  "syn",
]

[checks]
garde = false

[[waivers]]
rule = "RS-CARGO-CONFIG-07"
file = "Cargo.toml"
selector = "clippy:module_name_repetitions"
reason = "Shared code type names intentionally repeat the family and rule context."
