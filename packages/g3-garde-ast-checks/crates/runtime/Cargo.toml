[package]
name = "g3-garde-ast-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3 garde AST checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "garde", "ast", "checks", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
g3-garde-ast-checks-types = { path = "../types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
guardrail3-domain-config = { path = "../../../../apps/guardrail3/crates/domain/config" }
guardrail3-reason-policy = { path = "../../../reason-policy/crates/reason-policy", version = "0.0.0" }
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = "1.0.45"
syn = { version = "2", features = ["full", "parsing", "visit"] }
toml = "0.8"

[dev-dependencies]
g3-garde-ast-checks-assertions = { path = "../assertions" }
tempfile = "3"
