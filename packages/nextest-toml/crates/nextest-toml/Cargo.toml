[package]
name = "nextest-toml"
version = "0.1.0"
edition = "2024"
description = "Typed parser for .config/nextest.toml configuration files"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
keywords = ["nextest", "toml", "parser", "testing", "rust"]
categories = ["config", "development-tools", "parser-implementations"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["types"]
types = []

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"

[package.metadata.docs.rs]
all-features = true
