[package]
name = "mutants-toml-types"
version.workspace = true
edition = "2024"
description = "Typed model for .cargo/mutants.toml files"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["mutants", "toml", "types", "mutation-testing", "rust"]
categories = ["config", "development-tools", "parser-implementations"]
publish = true
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[package.metadata.guardrail3]
shared = true

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"

[package.metadata.docs.rs]
all-features = true
