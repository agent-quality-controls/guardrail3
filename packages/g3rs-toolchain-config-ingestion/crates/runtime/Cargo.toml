[package]
name = "g3rs-toolchain-config-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3rs toolchain config ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "toolchain", "ingestion", "rust"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[dependencies]
cargo-toml-parser = { path = "../../../cargo-toml-parser", version = "0.1.0" }
g3rs-toolchain-config-checks = { path = "../../../g3rs-toolchain-config-checks", version = "0.1.0" }
g3rs-toolchain-config-ingestion-types = { path = "../types", version = "0.1.0" }
g3rs-workspace-crawl = { path = "../../../g3rs-workspace-crawl", version = "0.1.0" }
rust-toolchain-toml-parser = { path = "../../../rust-toolchain-toml-parser", version = "0.1.0" }

[dev-dependencies]
g3rs-toolchain-config-ingestion-assertions = { path = "../assertions" }
g3rs-workspace-crawl = { path = "../../../g3rs-workspace-crawl", version = "0.1.0" }
tempfile = "3"
