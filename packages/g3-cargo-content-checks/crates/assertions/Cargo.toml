[package]
name = "g3-cargo-content-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertion helpers for g3 cargo content checks tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "cargo", "checks", "rust", "policy"]
categories = ["development-tools"]

[lints]
workspace = true

[features]
default = ["checks"]
checks = []

[dependencies]
g3-cargo-content-checks-runtime = { path = "../runtime" }
guardrail3-check-types = { path = "../../../guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
