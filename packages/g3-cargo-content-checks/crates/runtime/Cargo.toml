[package]
name = "g3-cargo-content-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3 cargo content checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "cargo", "checks", "rust", "policy"]
categories = ["development-tools"]

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
cargo-toml-parser = { path = "../../../cargo-toml-parser", version = "0.1.0" }
g3-cargo-content-checks-types = { path = "../types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }

[dev-dependencies]
g3-cargo-content-checks-assertions = { path = "../assertions" }
