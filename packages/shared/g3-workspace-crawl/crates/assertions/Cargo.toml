[package]
name = "g3-workspace-crawl-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertions for neutral guardrail3 workspace crawl tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "workspace", "crawl", "assertions"]
categories = ["development-tools"]
publish = false

[features]
default = ["all"]
all = ["crawl"]
crawl = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[dependencies]
g3-workspace-crawl-runtime = { path = "../runtime" }
