profile = "library"

allowed_deps = [
  "clippy-toml-parser-runtime",
  "clippy-toml-parser-types",
  "serde",
  "toml",
]

[checks]
garde = false

[[waivers]]
rule = "RS-CODE-SOURCE-19"
file = "crates/types/src/clippy_toml.rs"
selector = "struct:ClippyToml"
reason = "Schema mirror intentionally matches Clippy's config surface."

[[waivers]]
rule = "RS-CLIPPY-CONFIG-01"
file = "clippy.toml"
selector = "key:max-struct-bools"
reason = "Schema mirror package keeps the generated baseline while exempting the schema-mirror type from the bool-count cap."
