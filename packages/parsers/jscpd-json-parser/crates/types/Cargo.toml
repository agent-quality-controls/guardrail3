[package]
name = "jscpd-json-parser-types"
version.workspace = true
edition = "2024"
description = "Typed model for parsed .jscpd documents"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["typescript", "jscpd", "types", "config", "guardrail3"]
categories = ["development-tools", "parser-implementations"]
publish = false
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[package.metadata.guardrail3]
shared = true

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[package.metadata.docs.rs]
all-features = true
