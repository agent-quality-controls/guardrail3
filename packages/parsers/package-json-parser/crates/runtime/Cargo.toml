[package]
name = "package-json-parser-runtime"
version.workspace = true
edition = "2024"
description = "Parser implementation for package.json facade packages"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["typescript", "package-json", "parser", "json", "guardrail3"]
categories = ["development-tools", "parser-implementations"]
publish = false
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
serde_json = "1"
package-json-parser-types = { path = "../types", version = "0.1.0" }

[dev-dependencies]
tempfile = "3"
package-json-parser-runtime-assertions = { path = "../assertions" }

[package.metadata.docs.rs]
all-features = true
