[package]
name = "guardrail3-rs-toml-parser-runtime-assertions"
version = "0.0.0"
edition = "2024"
description = "Assertion helpers for guardrail3-rs.toml parser tests"
license.workspace = true
repository.workspace = true
publish = true
readme = "README.md"
keywords = ["guardrail3", "rust", "toml", "assertions", "parser"]
categories = ["config", "development-tools", "parser-implementations"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[dependencies]
guardrail3-rs-toml-parser-runtime = { path = "../runtime" }
