profile = "library"

allowed_deps = [
  "guardrail3-rs-toml-parser-runtime",
  "guardrail3-rs-toml-parser-runtime-assertions",
  "guardrail3-rs-toml-parser-types",
  "serde",
  "tempfile",
  "toml",
]

[checks]
garde = false

[[waivers]]
rule = "RS-CODE-SOURCE-19"
file = "crates/types/src/guardrail3_rs_toml.rs"
selector = "struct:TsAstroPolicyConfig"
reason = "Schema mirror intentionally matches the TypeScript Astro guardrail config surface."
