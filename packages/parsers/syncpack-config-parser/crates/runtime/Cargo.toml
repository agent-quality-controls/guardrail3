[package]
name = "syncpack-config-parser-runtime"
version.workspace = true
edition = "2024"
description = "Parser implementation for Syncpack config facade packages"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["typescript", "syncpack", "parser", "config", "guardrail3"]
categories = ["development-tools", "parser-implementations"]
publish = false
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
serde_json = "1"
syncpack-config-parser-types = { path = "../types", version = "0.1.0" }

[package.metadata.docs.rs]
all-features = true
