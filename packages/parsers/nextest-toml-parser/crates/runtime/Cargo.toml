[package]
name = "nextest-toml-parser-runtime"
version.workspace = true
edition = "2024"
description = "Parser implementation for nextest.toml facade packages"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["nextest", "toml", "parser", "testing", "rust"]
categories = ["config", "development-tools", "parser-implementations"]
publish = false
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
nextest-toml-parser-types = { path = "../types", version = "0.1.0" }
toml = "0.8"

[dev-dependencies]
nextest-toml-parser-runtime-assertions = { path = "../assertions" }
tempfile = "3"

[package.metadata.docs.rs]
all-features = true
