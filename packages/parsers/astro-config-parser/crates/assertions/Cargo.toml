[package]
name = "astro-config-parser-runtime-assertions"
version = "0.0.0"
edition = "2024"
description = "Assertion helpers for Astro config parser tests"
license.workspace = true
repository.workspace = true
publish = false
readme = "README.md"
keywords = ["astro", "config", "assertions", "typescript", "guardrail3"]
