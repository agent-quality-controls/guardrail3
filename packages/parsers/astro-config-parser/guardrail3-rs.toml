profile = "library"

allowed_deps = [
  "jsonc-parser",
  "serde",
  "serde_json",
  "swc_common",
  "swc_ecma_ast",
  "swc_ecma_parser",
  "package-json-parser-runtime",
  "package-json-parser-types",
]

[checks]
garde = false

[[waivers]]
rule = "g3rs-code/too-many-effective-code-lines"
subject = "crates/runtime/src/parser.rs"
selector = "effective-code-lines"
reason = "Astro config parser is a SWC reducer state machine; splitting it safely requires a dedicated parser-module extraction."

[[waivers]]
rule = "g3rs-code/too-many-use-imports"
subject = "crates/runtime/src/parser.rs"
selector = "top-level-use-imports"
reason = "Astro config parser imports one SWC AST surface in a single reducer; reducing imports safely belongs with the parser-module split."
