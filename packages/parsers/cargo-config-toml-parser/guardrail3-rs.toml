profile = "library"

allowed_deps = [
  "cargo-config-toml-parser-runtime",
  "cargo-config-toml-parser-runtime-assertions",
  "cargo-config-toml-parser-types",
  "serde",
  "tempfile",
  "toml",
]

[checks]
garde = false

[[waivers]]
rule = "RS-CODE-SOURCE-19"
file = "crates/types/src/cargo_config_toml.rs"
selector = "struct:CargoConfigToml"
reason = "Schema mirror intentionally matches Cargo's top-level config surface."
