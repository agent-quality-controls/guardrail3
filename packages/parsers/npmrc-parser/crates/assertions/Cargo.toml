[package]
name = "npmrc-parser-runtime-assertions"
version = "0.0.0"
edition = "2024"
description = "Assertion helpers for .npmrc parser tests"
license.workspace = true
repository.workspace = true
publish = false
readme = "README.md"
keywords = ["typescript", "tsconfig", "assertions", "jsonc", "guardrail3"]
categories = ["development-tools", "parser-implementations"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[dependencies]
npmrc-parser-runtime = { path = "../runtime" }
