[package]
name = "package-script-command-parser-runtime-assertions"
version = "0.0.0"
edition = "2024"
description = "Assertion helpers for package script command parser tests"
license.workspace = true
repository.workspace = true
publish = false
readme = "README.md"
keywords = ["typescript", "package-json", "assertions", "scripts", "guardrail3"]
