[package]
name = "g3rs-toml-parser-runtime"
version.workspace = true
edition = "2024"
description = "Parser implementation for guardrail3-rs.toml facade packages"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["guardrail3", "rust", "toml", "parser", "runtime"]
categories = ["config", "development-tools", "parser-implementations"]
publish = false
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
g3rs-toml-parser-types = { path = "../types", version = "0.1.0" }
toml = "0.8"

[dev-dependencies]
g3rs-toml-parser-runtime-assertions = { path = "../assertions" }
tempfile = "3"

[package.metadata.docs.rs]
all-features = true
