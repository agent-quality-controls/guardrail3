[package]
name = "deny-toml-parser-runtime-assertions"
version = "0.0.0"
edition = "2024"
description = "Assertion helpers for deny-toml parser tests"
license.workspace = true
repository.workspace = true
publish = false
readme = "README.md"
keywords = ["cargo-deny", "toml", "assertions", "parser", "rust"]
categories = ["config", "development-tools", "parser-implementations"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[dependencies]
deny-toml-parser-runtime = { path = "../runtime" }

[package.metadata.docs.rs]
all-features = true
