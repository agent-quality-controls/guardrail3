[package]
name = "release-plz-toml-parser-runtime-assertions"
version.workspace = true
edition = "2024"
description = "Assertion helpers for release-plz-toml parser tests"
license.workspace = true
repository.workspace = true
publish = false
readme = "README.md"
keywords = ["release-plz", "toml", "assertions", "parser", "rust"]
categories = ["config", "development-tools", "parser-implementations"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[dependencies]
release-plz-toml-parser-runtime = { path = "../runtime" }
tempfile = "3"

[package.metadata.docs.rs]
all-features = true
