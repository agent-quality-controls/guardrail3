profile = "library"

allowed_deps = [
  "rust-toolchain-toml-parser-runtime",
  "rust-toolchain-toml-parser-types",
  "serde",
  "toml",
]

[checks]
garde = false

[[waivers]]
rule = "RS-CODE-SOURCE-04"
file = "crates/runtime/src/fs.rs"
selector = "lint:clippy::disallowed_methods"
reason = "fs.rs is the centralized filesystem boundary for this parser crate."

[[waivers]]
rule = "RS-CODE-SOURCE-04"
file = "crates/runtime/src/parser.rs"
selector = "lint:clippy::disallowed_methods"
reason = "parser.rs is the centralized TOML parser boundary for this parser crate."
