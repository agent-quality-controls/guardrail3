[package]
name = "guardrail3-ts-toml-parser-types"
version.workspace = true
edition = "2024"
description = "Typed model for guardrail3-ts.toml files"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["guardrail3", "typescript", "toml", "types", "parser"]
categories = ["config", "development-tools", "parser-implementations"]
publish = false
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[package.metadata.guardrail3]
shared = true

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"

[package.metadata.docs.rs]
all-features = true
