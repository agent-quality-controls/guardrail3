[package]
name = "hook-shell-parser-runtime-assertions"
version.workspace = true
edition = "2024"
description = "Assertion helpers for hook shell parser tests"
license.workspace = true
repository.workspace = true
keywords = ["hook", "shell", "parser", "assertions", "rust"]
categories = ["development-tools", "parser-implementations"]
publish = false
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[dependencies]
hook-shell-parser-runtime = { path = "../runtime" }

[package.metadata.docs.rs]
all-features = true
