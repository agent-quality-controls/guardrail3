[package]
name = "hook-shell-parser-runtime"
version.workspace = true
edition = "2024"
description = "Runtime parser for executable shell hook content"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["hook", "shell", "parser", "guardrail3", "rust"]
categories = ["development-tools", "parser-implementations"]
publish = false
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
hook-shell-parser-types = { path = "../types", version = "0.1.0" }
tree-sitter = "0.25.10"
tree-sitter-bash = "0.25.1"

[dev-dependencies]
hook-shell-parser-runtime-assertions = { path = "../assertions" }

[package.metadata.docs.rs]
all-features = true
