[package]
name = "tsconfig-json-parser-runtime"
version.workspace = true
edition = "2024"
description = "Parser implementation for tsconfig JSONC facade packages"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["typescript", "tsconfig", "parser", "jsonc", "guardrail3"]
categories = ["development-tools", "parser-implementations"]
publish = false
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
jsonc-parser = { version = "0.32", features = ["serde"] }
serde_json = "1"
tsconfig-json-parser-types = { path = "../types", version = "0.1.0" }

[package.metadata.docs.rs]
all-features = true
