[package]
name = "g3-toolchain-content-checks-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertions for g3 toolchain content checks tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[dependencies]
g3-toolchain-content-checks-runtime = { path = "../runtime", version = "0.1.0" }
guardrail3-check-types = { path = "../../../guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
