[package]
name = "g3-toolchain-content-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3 toolchain content checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[dependencies]
cargo-toml-parser = { path = "../../../cargo-toml-parser" }
g3-toolchain-content-checks-types = { path = "../types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../guardrail3-check-types/crates/guardrail3-check-types", version = "0.1.0" }
rust-toolchain-toml-parser = { path = "../../../rust-toolchain-toml-parser" }

[dev-dependencies]
g3-toolchain-content-checks-assertions = { path = "../assertions" }
