[package]
name = "clippy-toml-parser-assertions"
version = "0.0.0"
edition = "2024"
description = "Assertion helpers for clippy-toml parser tests"
license.workspace = true
repository.workspace = true
publish = true
readme = "README.md"
keywords = ["clippy", "toml", "assertions", "parser", "rust"]
categories = ["config", "development-tools", "parser-implementations"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[dependencies]
clippy-toml-parser = { path = "../runtime" }
