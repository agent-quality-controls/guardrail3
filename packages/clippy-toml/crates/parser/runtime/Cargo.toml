[package]
name = "clippy-toml-parser"
version.workspace = true
edition = "2024"
description = "Parser implementation for clippy.toml facade packages"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
keywords = ["clippy", "toml", "parser", "lint", "rust"]
categories = ["config", "development-tools", "parser-implementations"]
publish = true
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
clippy-toml-types = { path = "../types", version = "0.1.0" }
toml = "0.8"

[dev-dependencies]
clippy-toml-parser-assertions = { path = "../assertions" }
tempfile = "3"

[package.metadata.docs.rs]
all-features = true
