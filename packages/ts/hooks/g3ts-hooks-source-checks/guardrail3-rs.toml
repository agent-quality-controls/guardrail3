profile = "library"

allowed_deps = [
  "g3ts-hooks-contract-types",
  "g3ts-hooks-source-checks-assertions",
  "g3ts-hooks-source-checks-runtime",
  "g3ts-hooks-types",
  "guardrail3-check-types",
  "hook-shell-parser",
]

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
file = "crates/assertions/src/common.rs"
selector = "struct:ExpectedRuleResult"
reason = "ExpectedRuleResult is a plain test-time data bag that exists only to express expected CheckResult shapes via struct-update syntax in tests; constructors would force dozens of overloads with no behavioral benefit."
