[package]
name = "g3ts-hooks-source-checks"
version = "0.1.0"
edition = "2024"
description = "TypeScript hook source checks for guardrail3"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
g3ts-hooks-contract-types = { path = "../g3ts-hooks-contract-types" }
g3ts-hooks-types = { path = "../g3ts-hooks-types" }
guardrail3-check-types = { path = "../../../shared/guardrail3-check-types", features = ["types"] }
hook-shell-parser = { path = "../../../parsers/hook-shell-parser", features = ["api"] }

[features]
default = ["api"]
api = []
