# Feature-level bans -- prevent agents from enabling kitchen-sink features
[[bans.features]]
name = "tokio"
deny = ["full"]
# Force explicit feature selection instead of enabling everything
allow = ["rt-multi-thread", "macros", "net", "sync", "signal", "bytes", "default", "io-util", "time"]

# ============================================================
# LICENSE CHECKING
# ============================================================
[licenses]
# All licenses are denied unless explicitly listed here
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Workspace crates with `publish = false` don't need a license field
[licenses.private]
ignore = true

# ============================================================
# SECURITY ADVISORY CHECKING
# ============================================================
[advisories]
# unmaintained: check workspace deps only (transitive unmaintained crates are not actionable)
unmaintained = "workspace"
yanked = "deny"
ignore = []

# ============================================================
# SOURCE RESTRICTIONS
# ============================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["sparse+https://index.crates.io/"]
allow-git = []
