profile = "library"

allowed_deps = [
  "g3ts-topology-types",
  "tempfile",
  "walkdir",
]

[[waivers]]
rule = "multiple_crate_versions"
subject = "Cargo.toml"
selector = "lint:clippy::multiple_crate_versions"
reason = "This internal workspace package intentionally depends on shared internal crates with overlapping transitive versions."
