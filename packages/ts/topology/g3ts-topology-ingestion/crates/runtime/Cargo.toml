[package]
name = "g3ts-topology-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3ts topology ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "topology", "ingestion", "typescript"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
g3ts-topology-ingestion-types = { path = "../types", version = "0.1.0" }
g3ts-topology-types = { path = "../../../g3ts-topology-types", version = "0.1.0" }
walkdir = "2"
