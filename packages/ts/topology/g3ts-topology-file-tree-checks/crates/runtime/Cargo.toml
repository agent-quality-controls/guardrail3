[package]
name = "g3ts-topology-file-tree-checks-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3ts topology file-tree checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "topology", "file-tree", "checks", "typescript"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["checks"]
checks = []

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true

[dependencies]
g3ts-topology-types = { path = "../../../g3ts-topology-types", version = "0.1.0" }
guardrail3-check-types = { path = "../../../../../shared/guardrail3-check-types", version = "0.1.0" }

[dev-dependencies]
g3ts-topology-file-tree-checks-assertions = { path = "../assertions" }
g3ts-topology-ingestion-runtime = { path = "../../../g3ts-topology-ingestion/crates/runtime", version = "0.1.0" }
tempfile = "3"
