[package]
name = "g3ts-package-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3ts package.json ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
keywords = ["guardrail3", "typescript", "package-json", "ingestion"]
categories = ["development-tools"]
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
g3-workspace-crawl = { path = "../../../../../shared/g3-workspace-crawl", version = "0.1.0", default-features = false, features = ["api"] }
g3ts-package-types = { path = "../../../g3ts-package-types", version = "0.1.0" }
package-json-parser = { path = "../../../../../parsers/package-json-parser", version = "0.1.0", features = ["api"] }
package-script-command-parser = { path = "../../../../../parsers/package-script-command-parser", version = "0.1.0", features = ["api"] }
serde = { version = "1", features = ["derive"] }
serde_norway = "0.9.42"
syncpack-config-parser = { path = "../../../../../parsers/syncpack-config-parser", version = "0.1.0", features = ["api"] }
