profile = "library"

allowed_deps = [
  "g3ts-package-types",
  "guardrail3-check-types",
  "package-json-parser",
]

[[waivers]]
rule = "RS-ARCH-FILETREE-07"
file = "crates/runtime/Cargo.toml"
selector = "structural-split"
reason = "config-check packages keep one rule per file at runtime root"

[checks]
garde = false
