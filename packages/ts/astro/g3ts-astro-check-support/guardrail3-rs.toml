profile = "library"

allowed_deps = [
  "astro-config-parser",
  "eslint-config-parser",
  "g3-workspace-crawl",
  "g3rs-workspace-crawl",
  "g3ts-astro-types",
  "globset",
  "guardrail3-check-types",
  "guardrail3-rs-toml-parser",
  "package-json-parser",
  "package-script-command-parser",
  "serde_json",
  "syncpack-config-parser",
  "url",
]

[[waivers]]
rule = "RS-CODE-SOURCE-09"
file = "src/ingestion.rs"
selector = "effective-code-lines"
reason = "Shared Astro ingestion support preserves the existing parser-normalizer while public ingestion ownership moves to setup, content, mdx, seo, and state packages."

[[waivers]]
rule = "RS-CODE-SOURCE-10"
file = "src/ingestion.rs"
selector = "top-level-use-imports"
reason = "Shared Astro ingestion support imports every parsed fact surface used by the per-area ingestion packages."

[checks]
garde = false
