profile = "library"

[checks]
garde = false

[[waivers]]
rule = "g3rs-code/too-many-use-imports"
subject = "src/lib.rs"
selector = "top-level-use-imports"
reason = "Type package facade explicitly re-exports the public DTO contract; broad re-exports are forbidden and splitting the contract would hide package ownership."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/types.rs"
selector = "struct:G3TsAstroPackageSurfaceSnapshot"
reason = "Type package exposes typed DTOs consumed by separate ingestion and check crates; fields are the public package contract."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/types.rs"
selector = "struct:G3TsAstroPackageScriptCommand"
reason = "Type package exposes typed DTOs consumed by separate ingestion and check crates; fields are the public package contract."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/types.rs"
selector = "struct:G3TsAstroPackageScriptToolInvocation"
reason = "Type package exposes typed DTOs consumed by separate ingestion and check crates; fields are the public package contract."

