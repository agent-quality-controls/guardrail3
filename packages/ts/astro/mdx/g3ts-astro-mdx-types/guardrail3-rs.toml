profile = "library"

allowed_deps = []

[checks]
garde = false

[[waivers]]
rule = "g3rs-code/many-use-imports"
subject = "src/lib.rs"
selector = "top-level-use-imports"
reason = "Type package facade explicitly re-exports the public DTO contract; splitting the facade would hide package ownership instead of reducing coupling."

[[waivers]]
rule = "g3rs-code/large-type-inventory"
subject = "src/types.rs"
selector = "struct:G3TsAstroMdxEslintSurfaceSnapshot"
reason = "The ESLint surface snapshot is a typed DTO carrying one effective-config probe contract across ingestion and check crates; splitting it would duplicate the same ESLint fact boundary."

[[waivers]]
rule = "g3rs-code/public-struct-named-fields"
subject = "src/types.rs"
selector = "struct:G3TsAstroPackageSurfaceSnapshot"
reason = "Type package exposes typed DTOs consumed by separate ingestion and check crates; fields are the public package contract."

