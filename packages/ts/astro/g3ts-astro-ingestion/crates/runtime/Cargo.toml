[package]
name = "g3ts-astro-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3ts astro ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
keywords = ["guardrail3", "typescript", "astro", "ingestion"]
categories = ["development-tools"]
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
astro-config-parser = { path = "../../../../../parsers/astro-config-parser", version = "0.1.0", features = ["api"] }
eslint-config-parser = { path = "../../../../../parsers/eslint-config-parser", version = "0.1.0", features = ["api"] }
package-json-parser = { path = "../../../../../parsers/package-json-parser", version = "0.1.0", features = ["api"] }
g3-workspace-crawl = { path = "../../../../../rs/g3rs-workspace-crawl", package = "g3rs-workspace-crawl", version = "0.1.0", default-features = false, features = ["api"] }
g3ts-astro-types = { path = "../../../g3ts-astro-types", version = "0.1.0" }

[dev-dependencies]
tempfile = "3"
