[package]
name = "g3ts-astro-media-ingestion-runtime"
version.workspace = true
edition.workspace = true
description = "Runtime ingestion for guardrail3 TypeScript Astro media checks"
license.workspace = true
rust-version.workspace = true
repository.workspace = true
publish = false

[dependencies]
astro-config-parser = { path = "../../../../../../parsers/astro-config-parser", version = "0.1.0", features = ["api"] }
eslint-config-parser = { path = "../../../../../../parsers/eslint-config-parser", version = "0.1.0", features = ["api"] }
g3-workspace-crawl = { path = "../../../../../../rs/g3rs-workspace-crawl", package = "g3rs-workspace-crawl", features = ["api"] }
g3ts-astro-check-support = { path = "../../../../g3ts-astro-check-support", version = "0.1.0" }
g3ts-astro-media-types = { path = "../../../g3ts-astro-media-types", version = "0.1.0" }
guardrail3-rs-toml-parser = { path = "../../../../../../parsers/guardrail3-rs-toml-parser", version = "0.1.0", features = ["api"] }
package-json-parser = { path = "../../../../../../parsers/package-json-parser", version = "0.1.0", features = ["api"] }
package-script-command-parser = { path = "../../../../../../parsers/package-script-command-parser", version = "0.1.0", features = ["api"] }
serde_json = "1"

[dev-dependencies]
g3ts-astro-media-ingestion-assertions = { path = "../assertions" }

[features]
default = ["api"]
api = []

[lints]
workspace = true
