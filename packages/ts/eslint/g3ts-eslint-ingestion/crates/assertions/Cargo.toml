[package]
name = "g3ts-eslint-ingestion-assertions"
version = "0.1.0"
edition = "2024"
description = "Assertion helpers for g3ts eslint ingestion tests"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "typescript", "eslint", "ingestion"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[lints]
workspace = true

[features]
default = ["all"]
all = ["checks"]
checks = []

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true

[dependencies]
g3-workspace-crawl = { path = "../../../../../shared/g3-workspace-crawl", version = "0.1.0", features = ["api"], default-features = false }
g3ts-eslint-ingestion-runtime = { path = "../runtime" }
g3ts-eslint-types = { path = "../../../g3ts-eslint-types", version = "0.1.0" }
