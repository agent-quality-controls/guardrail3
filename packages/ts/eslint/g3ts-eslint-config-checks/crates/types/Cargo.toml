[package]
name = "g3ts-eslint-config-checks-types"
version = "0.1.0"
edition = "2024"
description = "Public contract types for g3ts eslint config checks"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
readme = "README.md"
keywords = ["guardrail3", "typescript", "eslint", "types"]
categories = ["development-tools"]
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["api"]
api = []

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true

[package.metadata.guardrail3]
shared = true

[dependencies]
g3ts-eslint-types = { path = "../../../g3ts-eslint-types", version = "0.1.0" }
