[package]
name = "g3ts-apparch-ingestion-runtime"
version = "0.1.0"
edition = "2024"
description = "Runtime implementation for g3ts apparch ingestion"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
repository = "https://github.com/ArcticLens/websmasher"
keywords = ["guardrail3", "typescript", "apparch", "ingestion"]
categories = ["development-tools"]
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE*"]
publish = false

[features]
default = ["all"]
all = ["ingest"]
ingest = []

[lints]
workspace = true

[package.metadata.guardrail3]
shared = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
g3-workspace-crawl = { path = "../../../../../shared/g3-workspace-crawl", version = "0.1.0", default-features = false, features = ["api"] }
g3ts-apparch-types = { path = "../../../g3ts-apparch-types", version = "0.1.0" }
tree-sitter = "0.25.9"
tree-sitter-typescript = "0.23.2"
