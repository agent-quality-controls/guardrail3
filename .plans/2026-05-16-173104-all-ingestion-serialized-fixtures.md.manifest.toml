[[forbidden_pattern]]
description = "Python fixture scripts must not map family-specific Rust fields"
glob = "scripts/behavior/fixture3-g3rs-*-ingestion.py"
patterns = ["source_checks[", "config_checks[", "file_tree_checks[", "repo_root_checks["]

[[verification]]
command = "fixture3 check --suite g3rs-<family>-ingestion"

[[verification]]
command = "python3 scripts/behavior/verify-test-deletion.py"

[[verification]]
command = "bash scripts/behavior/verify-all.sh"

[[verification]]
command = "g3rs validate repo --path \"$PWD\""
