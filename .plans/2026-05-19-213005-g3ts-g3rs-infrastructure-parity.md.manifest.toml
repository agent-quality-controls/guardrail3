[[init_contract]]
tool = "g3ts"
file = "apps/guardrail3-ts/crates/logic/validate-command/crates/runtime/src/init.rs"
must_print = ["validate with: g3ts validate repo --path", "validate with: g3ts validate workspace --path"]
forbidden_calls = ["execute_repo(", "execute("]

[[init_contract]]
tool = "g3rs"
file = "apps/guardrail3-rs/crates/logic/validate-command/crates/runtime/src/init.rs"
must_print = ["validate with: g3rs validate repo --path", "validate with: g3rs validate workspace --path"]
forbidden_calls = ["execute_repo(", "execute("]

[[execution_ownership]]
