plan = ".plans/2026-05-19-213005-g3ts-g3rs-infrastructure-parity.md"

[[cli_surface]]
tool = "g3ts"
commands = [
  "init repo",
  "init workspace",
  "validate repo",
  "validate workspace",
]
workspace_flags = ["--path", "--family", "--inventory", "--staged", "--rules-only"]
repo_validate_flags = ["--path", "--inventory"]

[[cli_surface]]
tool = "g3rs"
commands = [
  "init repo",
  "init workspace",
  "validate repo",
  "validate workspace",
]
workspace_flags = ["--path", "--family", "--inventory", "--staged", "--rules-only"]
repo_validate_flags = ["--path", "--inventory"]

