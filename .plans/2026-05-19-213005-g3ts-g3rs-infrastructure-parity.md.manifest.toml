[[hook_contract]]
tool = "g3ts"
file = "apps/guardrail3-ts/crates/logic/validate-command/crates/runtime/src/init.rs"
required_fragments = [
  "set -euo pipefail",
  "gitleaks protect --staged --no-banner",
  "max_file_size=1048576",
  "g3ts validate repo --path \"$repo_root\"",
  "g3ts validate workspace --path \"$unit\" --staged",
  "guardrail3-ts.toml",
]

[[hook_contract]]
