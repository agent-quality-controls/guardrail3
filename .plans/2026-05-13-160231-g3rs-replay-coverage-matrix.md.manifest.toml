[coverage_matrix]
path = "behavior/coverage/g3rs-rule-coverage.toml"
required_rows = 276
source_roots = [ "packages/rs", "apps/guardrail3-rs",]
baseline_roots = [ "behavior/baselines/g3rs", "behavior/baselines/g3rs-validate-repo",]
fixture_manifests = [
  ".plans/2026-05-12-183156-guardrail3-behavior-replay-fixture-migration.md.manifest.toml",
  ".plans/2026-05-12-222909-g3rs-validate-repo-fixtures.md.manifest.toml",
]

[verifier]
path = "scripts/behavior/verify-rule-coverage.py"
wire_into = "scripts/behavior/verify-all.sh"
success_prefix = "behavior-rule-coverage: PASS"
failure_prefix = "behavior-rule-coverage: FAIL"

[expected_counts]
source_rule_ids = 276
baseline_rule_ids = 227
baseline_error_warn_rule_ids = 195
info_only_rule_ids = 32
absent_rule_ids = 49

[allowed_values]
current_replay = [ "absent", "info_only", "error_or_warn",]
target_replay = [ "error_or_warn", "info_inventory",]
coverage_status = [
  "covered",
  "planned_fixture",
  "planned_existing_fixture_expansion",
  "planned_cli_surface",
]

