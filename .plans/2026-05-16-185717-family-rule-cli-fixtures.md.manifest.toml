[target]
fixture_root = "behavior/fixtures/g3rs-rules"
suite = "g3rs-validate"
verifier = "scripts/behavior/verify-family-rule-fixtures.py"
strategy = "replace_broad_composite_rule_fixtures"
coverage_mode = "incremental"

[[fixture_corpus]]
path = "behavior/fixtures/g3rs"
status = "transitional_broad_composite"
action = "reduce_or_remove_after_family_rule_coverage_replaces_it"

[[fixture_corpus]]
path = "behavior/fixtures/g3rs-global"
status = "target_global_cli_gating"
action = "create_by_renaming_or_reducing_global-only fixtures from behavior/fixtures/g3rs"

[[fixture_corpus]]
path = "behavior/fixtures/g3rs-rules"
status = "target_family_rule_coverage"
action = "build minimized family fixtures"

[[family]]
name = "cargo"
remaining_rule_rows = 42
fixture_dir = "behavior/fixtures/g3rs-rules/cargo"
first = true
status = "completed"
covered_by_cli_output = 26
kept_internal_unit_tests = 16

[[family]]
name = "clippy"
remaining_rule_rows = 43
fixture_dir = "behavior/fixtures/g3rs-rules/clippy"

[[family]]
name = "deny"
remaining_rule_rows = 41
fixture_dir = "behavior/fixtures/g3rs-rules/deny"

[[family]]
name = "apparch"
remaining_rule_rows = 44
fixture_dir = "behavior/fixtures/g3rs-rules/apparch"

[[family]]
name = "arch"
remaining_rule_rows = 31
fixture_dir = "behavior/fixtures/g3rs-rules/arch"

[[family]]
name = "release"
remaining_rule_rows = 24
fixture_dir = "behavior/fixtures/g3rs-rules/release"

[[family]]
name = "toolchain"
remaining_rule_rows = 5
fixture_dir = "behavior/fixtures/g3rs-rules/toolchain"

[[family]]
name = "deps"
remaining_rule_rows = 3
fixture_dir = "behavior/fixtures/g3rs-rules/deps"

[[family]]
name = "hooks"
remaining_rule_rows = 2
fixture_dir = "behavior/fixtures/g3rs-rules/hooks"

[[family]]
name = "fmt"
remaining_rule_rows = 1
fixture_dir = "behavior/fixtures/g3rs-rules/fmt"

[[required_fixture_field]]
name = "rule_family"

[[required_fixture_field]]
name = "target_rules"

[[required_fixture_field]]
name = "expected_findings"

[[suite_fixture_glob]]
suite = "g3rs-validate"
glob = "behavior/fixtures/g3rs/*/fixture.toml"
status = "transitional"

[[suite_fixture_glob]]
suite = "g3rs-validate"
glob = "behavior/fixtures/g3rs-global/*/fixture.toml"
status = "target"

[[suite_fixture_glob]]
suite = "g3rs-validate"
glob = "behavior/fixtures/g3rs-rules/*/*/fixture.toml"
status = "target"

[[forbidden]]
kind = "fixture_output_crate"
path_glob = "packages/rs/**/crates/fixture-output"

[[forbidden]]
kind = "serialized_ingestion_suite"
suite_name_pattern = "g3rs-*-ingestion"

[[verification]]
command = "fixture3 check --suite g3rs-validate"

[[verification]]
command = "python3 scripts/behavior/verify-family-rule-fixtures.py"

[[verification]]
command = "python3 scripts/behavior/verify-test-deletion.py"

[[verification]]
command = "bash scripts/behavior/verify-all.sh"

