[target]
fixture_root = "behavior/fixtures/g3ts-rules"
suite = "g3ts-rule-fixtures"
repo_suite = "g3ts-validate-repo"
cli_suite = "g3ts-cli-output"
replay = "scripts/behavior/fixture3-g3ts-replay.py"
family_verifier = "scripts/behavior/verify-g3ts-family-rule-fixtures.py"
coverage_verifier = "scripts/behavior/verify-g3ts-rule-coverage.py"
coverage_mode = "external_cli_behavior"

[[suite]]
name = "g3ts-rule-fixtures"
fixture_glob = "behavior/fixtures/g3ts-rules/*/*/fixture.toml"
approved_dir = "behavior/golden/g3ts-rule-fixtures"
received_dir = ".fixture3/g3ts-rule-fixtures"
