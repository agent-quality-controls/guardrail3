[target]
fixture_root = "behavior/fixtures/g3ts-rule"
suite = "g3ts-rule"
repo_suite = "g3ts-validate-repo"
cli_suite = "g3ts-cli-output"
replay = "scripts/behavior/fixture3-g3ts-fixture-replay.py"
family_verifier = "scripts/behavior/verify-g3ts-family-rule-fixtures.py"
coverage_verifier = "scripts/behavior/verify-g3ts-rule-fixture-coverage.py"
coverage_mode = "external_cli_behavior"

[[suite]]
name = "g3ts-rule"
fixture_glob = "behavior/fixtures/g3ts-rule/*/*/fixture.toml"
approved_dir = "behavior/golden/g3ts-rule"
received_dir = ".fixture3/g3ts-rule"
diff_dir = ".fixture3/g3ts-rule"

[[suite]]
name = "g3ts-validate-repo"
fixture_glob = "behavior/fixtures/g3ts-validate-repo/*/fixture.toml"
approved_dir = "behavior/golden/g3ts-validate-repo"
received_dir = ".fixture3/g3ts-validate-repo"
diff_dir = ".fixture3/g3ts-validate-repo"

[[suite]]
name = "g3ts-cli-output"
fixture_glob = "behavior/fixtures/g3ts-cli-output/*/fixture.toml"
approved_dir = "behavior/golden/g3ts-cli-output"
received_dir = ".fixture3/g3ts-cli-output"
diff_dir = ".fixture3/g3ts-cli-output"

