# =============================================================================
# Layer 5: empirical regression scenarios
# Each scenario injects a regression into a target file, runs validate-repo,
# asserts exit code and a specific rule fires at Severity::Error, then
# restores the file (md5 round-trip).
# =============================================================================

# RS hook regressions (10 scenarios)

[[regression_scenario]]
id = "rs-01-hardcoded-literal-scope"
target = ".githooks/pre-commit"
inject = "replace_token"
inject_from = "--path \"$unit\" --staged"
inject_to = "--path \"apps/guardrail3-rs\" --staged"
command = "g3rs validate-repo"
expected_exit = 1
expected_rule = "g3rs-hooks/routing-scope-not-hardcoded-literal"
expected_severity = "Error"

[[regression_scenario]]
id = "rs-02-repo-root-prefixed-literal-scope"
target = ".githooks/pre-commit"
inject = "replace_token"
inject_from = "--path \"$unit\" --staged"
inject_to = "--path \"$REPO_ROOT/apps/guardrail3-rs\" --staged"
command = "g3rs validate-repo"
expected_exit = 1
expected_rule = "g3rs-hooks/routing-scope-not-hardcoded-literal"
expected_severity = "Error"

[[regression_scenario]]
id = "rs-03-ambient-repo-root-after-loop"
target = ".githooks/pre-commit"
inject = "append_before_final_echo"
inject_text = "g3rs validate --path \"$REPO_ROOT\" --staged"
command = "g3rs validate-repo"
expected_exit = 1
expected_rule = "g3rs-hooks/routing-scope-not-hardcoded-literal"
expected_severity = "Error"

[[regression_scenario]]
id = "rs-04-env-override-default-substitution"
target = ".githooks/pre-commit"
inject = "prepend_before_rust_loop"
inject_text = "RUST_WORKSPACE=\"${GUARDRAIL3_RUST_WORKSPACE:-apps/guardrail3-rs}\""
inject_replace_loop_scope = true
command = "g3rs validate-repo"
expected_exit = 1
expected_rule = "g3rs-hooks/routing-no-env-override"
expected_severity = "Error"

[[regression_scenario]]
id = "rs-05-command-substitution-default"
target = ".githooks/pre-commit"
inject = "prepend_before_rust_loop"
inject_text = "RUST_WORKSPACE=\"$(cat /etc/foo 2>/dev/null || echo apps/guardrail3-rs)\""
inject_replace_loop_scope = true
command = "g3rs validate-repo"
expected_exit = 1
expected_rule = "g3rs-hooks/routing-no-env-override"
expected_severity = "Error"

[[regression_scenario]]
id = "rs-06-default-fallback-literal"
target = ".githooks/pre-commit"
inject = "prepend_before_rust_loop_invocation"
inject_text = "if [ -z \"$RUST_UNIQUE_UNITS\" ]; then RUST_UNIQUE_UNITS=\"apps/guardrail3-rs\"; fi"
command = "g3rs validate-repo"
expected_exit = 1
expected_rule = "g3rs-hooks/routing-no-env-override"
expected_severity = "Error"

[[regression_scenario]]
id = "rs-07-default-fallback-variable-prefixed-literal"
target = ".githooks/pre-commit"
inject = "prepend_before_rust_loop_invocation"
inject_text = "if [ -z \"$RUST_UNIQUE_UNITS\" ]; then RUST_UNIQUE_UNITS=\"$REPO_ROOT/apps/guardrail3-rs\"; fi"
command = "g3rs validate-repo"
expected_exit = 1
expected_rule = "g3rs-hooks/routing-no-env-override"
expected_severity = "Error"

[[regression_scenario]]
