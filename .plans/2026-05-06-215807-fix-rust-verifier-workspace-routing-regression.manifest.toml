# Layer 8: real-artifact tests — each language must have at least one
# include_str! test against each real artifact.
# =============================================================================

[[real_artifact_test]]
package = "g3rs-hooks-source-checks"
artifact = ".githooks/pre-commit"
test_pattern = "real_repo.*hook.*passes"
description = "Real-hook-passes-all-rules test must exist."

