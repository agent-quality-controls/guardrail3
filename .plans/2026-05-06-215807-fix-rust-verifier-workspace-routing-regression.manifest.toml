# =============================================================================
# Layer 6: severity invariants — all listed rules emit Severity::Error on
# their failure case.
# =============================================================================
# (Encoded via severity_on_violation in [[rule]] above. No separate section.)

# =============================================================================
# Layer 7: test pinning — every failure-mode test for the listed rules must
# call `assert_error_finding` (not `assert_finding`) so a future severity
# regression is caught at compile/test time.
# =============================================================================

[[test_pinning]]
package = "g3rs-hooks-source-checks"
test_helpers_accepted = [
  "assert_error_finding",
  "assert_finding",
  "assert_missing_pattern_error",
  "assert_missing_coverage_error",
]
applies_to_tests_matching = "fires_"
description = "Every failure-mode test must use a helper that internally asserts Severity::Error: assert_error_finding directly, assert_finding (which delegates), or a rule-specific helper whose body asserts Error (e.g. assert_missing_pattern_error in contract_trigger_coverage)."

[[test_pinning]]
package = "g3ts-hooks-source-checks"
test_helpers_accepted = ["assert_error_finding", "assert_finding"]
applies_to_tests_matching = "fires_"
description = "Every failure-mode test must use either assert_error_finding directly or assert_finding (which delegates to assert_error_finding)."

