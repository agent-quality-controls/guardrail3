# =============================================================================
# Layer 3b removed: family contracts use typed `G3HookCommandRequirement`
# enum variants, not literal command strings, so a substring grep does not
# work. The contract -> command mapping is enforced by:
#   - Layer 3 (rule presence): each command has a corresponding source-check
#     rule, and removing the rule fails Layer 3.
#   - Layer 5 (regression scenarios): injecting a bad hook fires the rule
#     end-to-end, which depends on the contract producing the correct
#     command.
# A future Layer 3b reimplementation could invoke each family's
# `hook_contract()` via a test binary and diff against an expected list,
# but that is not necessary for this slice's gating.
# =============================================================================

