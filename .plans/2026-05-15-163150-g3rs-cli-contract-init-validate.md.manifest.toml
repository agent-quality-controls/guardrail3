[plan]
path = ".plans/2026-05-15-163150-g3rs-cli-contract-init-validate.md"

[[cli_command]]
argv = ["g3rs", "init", "repo"]
must_parse = true

[[cli_command]]
argv = ["g3rs", "init", "repo", "--path", "."]
must_parse = true

[[cli_command]]
argv = ["g3rs", "init", "workspace", "--path", "."]
must_parse = true

[[cli_command]]
argv = ["g3rs", "validate", "repo"]
must_parse = true

[[cli_command]]
argv = ["g3rs", "validate", "repo", "--path", "."]
must_parse = true

[[cli_command]]
argv = ["g3rs", "validate", "workspace", "--path", "."]
must_parse = true

[[cli_command]]
argv = ["g3rs", "validate", "workspace", "--path", ".", "--family", "topology"]
must_parse = true

[[cli_command]]
argv = ["g3rs", "validate-repo"]
must_parse = false

[[cli_command]]
argv = ["g3rs", "validate", "--path", "."]
must_parse = false

[[cli_command]]
argv = ["g3rs", "init", "workspace", "--path", ".", "--profile", "library"]
must_parse = false

[[root_help_phrase]]
text = "g3rs init repo"

[[root_help_phrase]]
text = "g3rs init workspace --path <path>"

[[root_help_phrase]]
text = "g3rs validate repo"

[[root_help_phrase]]
text = "g3rs validate workspace --path <path>"

[[root_help_phrase]]
text = "init writes setup"

[[root_help_phrase]]
text = "validate only reports"

[[root_help_phrase]]
text = "repo       Git repository surface"

[[root_help_phrase]]
text = "workspace  One adopted Rust unit"

[[managed_hook_file]]
path = ".githooks/pre-commit.d/g3rs"
generated_header = "# Generated by g3rs. Do not edit this file directly."

[[hook_chain]]
pre_commit = ".githooks/pre-commit"
managed_hook = ".githooks/pre-commit.d/g3rs"
required_repo_command = "g3rs validate repo"
required_workspace_command = "g3rs validate workspace"

[[validate_output]]
scope = "repo"
prefixes = ["scope: repo", "root: "]

[[validate_output]]
scope = "workspace"
prefixes = ["scope: workspace", "root: "]

[[doc]]
path = "docs/cli.md"
required_phrases = [
  "g3rs init repo",
  "g3rs init workspace --path <path>",
  "g3rs validate repo",
  "g3rs validate workspace --path <path>",
  "deleted command forms",
]

[[doc]]
path = "docs/rs/project-shape.md"
required_phrases = [
  "adopted Rust unit",
  "repo hook surface",
  "allowed workspace root shapes",
  "forbidden root shapes",
  "apparch layer",
  "topology owns",
  "apparch owns",
  "cargo does not own project shape",
]

[[verification]]
command = "scripts/verify-g3rs-cli-contract.py"
cwd = "."

[[verification]]
command = "cargo test --manifest-path apps/guardrail3-rs/crates/io/inbound/cli/crates/runtime/Cargo.toml"
cwd = "."

[[verification]]
command = "cargo test --manifest-path apps/guardrail3-rs/crates/types/app-types/Cargo.toml"
cwd = "."

[[verification]]
command = "cargo test --manifest-path apps/guardrail3-rs/crates/logic/validate-command/crates/runtime/Cargo.toml"
cwd = "."

[[verification]]
command = "cargo test --manifest-path apps/guardrail3-rs/crates/io/outbound/report/crates/runtime/Cargo.toml"
cwd = "."
