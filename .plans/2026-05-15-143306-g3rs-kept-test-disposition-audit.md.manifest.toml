[disposition_audit]
source_ledger = "behavior/migration/g3rs-test-fixture-ledger.toml"
output_ledger = "behavior/migration/g3rs-kept-test-disposition.toml"
kept_rows = 755

[[disposition]]
name = "needs_rule_fixture_or_golden_output"
expected_rows = 194
meaning = "direct rule-sidecar behavior that should be moved to fixture or golden replay"

[[disposition]]
name = "keep_internal_unit_test"
expected_rows = 437
meaning = "internal ingestion package behavior kept as unit tests until each row is replaced by user-visible CLI fixtures or deleted as internal-shape-only"

[[disposition]]
name = "needs_family_runner_output"
expected_rows = 47
meaning = "family runner fan-out, aggregation, and dispatch behavior"

[[disposition]]
name = "needs_validate_command_output"
expected_rows = 23
meaning = "validate-command cargo gates, staged-path, family-selection, and execution behavior"

[[disposition]]
name = "covered_by_cli_output"
expected_rows = 37
meaning = "CLI parse, rejected argument, stdout, stderr, and exit behavior covered by the g3rs-cli-output fixture3 suite"

[[disposition]]
name = "covered_by_renderer_output"
expected_rows = 4
meaning = "plain text report rendering behavior covered by the g3rs-report-output fixture3 suite"

[[disposition]]
name = "keep_public_api_contract"
expected_rows = 13
meaning = "hook-contract public policy tests that remain compile/API contracts"

[[verification]]
command = "python3 scripts/behavior/classify-kept-test-dispositions.py --check"

[[verification]]
command = "python3 scripts/behavior/verify-kept-test-dispositions.py"

[[verification]]
command = "scripts/behavior/verify-all.sh"
