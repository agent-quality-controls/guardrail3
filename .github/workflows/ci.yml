name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check Rust workspace
        run: |
          cargo build --manifest-path apps/guardrail3-rs/Cargo.toml
          cargo test --manifest-path apps/guardrail3-rs/Cargo.toml
          cargo clippy --manifest-path apps/guardrail3-rs/Cargo.toml --all-targets --all-features -- -D warnings
