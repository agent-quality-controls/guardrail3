name: Bug report
description: Something is broken or misbehaving
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Minimal commands and code that trigger the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: guardrail3 version
    validations:
      required: true
  - type: input
    id: toolchain
    attributes:
      label: Rust toolchain
      description: Output of `rustc --version`
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output / logs
      render: shell
