[[waivers]]
rule = "g3rs-arch/dependency-count-split"
file = "crates/logic/family-runner-process/crates/runtime/Cargo.toml"
selector = "dependency-count"
reason = "Process family runner is the deliberate aggregation point that wires many independent family packages into the CLI; splitting this crate would hide the composition instead of reducing coupling."
