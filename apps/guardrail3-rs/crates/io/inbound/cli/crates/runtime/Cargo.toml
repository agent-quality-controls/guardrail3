[package]
name = "guardrail3-rs"
version.workspace = true
edition.workspace = true
publish = false

[dependencies]
clap.workspace = true
g3-workspace-crawl.workspace = true
guardrail3-rs-app-types = { path = "../../../../../types/app-types" }
guardrail3-rs-family-runner-style = { path = "../../../../../logic/family-runner-style" }
guardrail3-rs-family-runner-policy = { path = "../../../../../logic/family-runner-policy" }
guardrail3-rs-family-runner-quality = { path = "../../../../../logic/family-runner-quality" }
guardrail3-rs-family-runner-process = { path = "../../../../../logic/family-runner-process/crates/runtime" }
guardrail3-rs-family-runner-test = { path = "../../../../../logic/family-runner-test" }
guardrail3-rs-family-runner-structure = { path = "../../../../../logic/family-runner-structure" }
guardrail3-rs-validate-command = { path = "../../../../../logic/validate-command/crates/runtime" }
guardrail3-rs-packages = { path = "../../../../outbound/packages" }
guardrail3-rs-report = { path = "../../../../outbound/report/crates/runtime" }

[dev-dependencies]
g3-workspace-crawl.workspace = true
guardrail3-rs-assertions = { path = "../assertions" }
tempfile = "3.18.0"

[features]
default = ["api"]
api = []

[package.metadata.guardrail3]
shared = true

[[bin]]
name = "g3rs"
path = "src/main.rs"

[lints]
workspace = true
