[workspace]
members = [
    "crates/types/app-types",
    "crates/logic/family-runner-style",
    "crates/logic/family-runner-policy",
    "crates/logic/family-runner-quality",
    "crates/logic/family-runner-process/crates/runtime",
    "crates/logic/family-runner-test",
    "crates/logic/family-runner-structure",
    "crates/logic/validate-command/crates/runtime",
    "crates/io/inbound/cli/crates/runtime",
    "crates/io/outbound/packages",
    "crates/io/outbound/report/crates/runtime",
]
resolver = "2"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
clap = { version = "4.5", features = ["derive"] }
guardrail3-check-types = { path = "../../packages/shared/guardrail3-check-types" }
g3-workspace-crawl = { path = "../../packages/shared/g3-workspace-crawl", features = ["api"] }

g3rs-apparch-config-checks = { path = "../../packages/rs/apparch/g3rs-apparch-config-checks" }
g3rs-apparch-hook-contract = { path = "../../packages/rs/apparch/g3rs-apparch-hook-contract" }
g3rs-apparch-ingestion = { path = "../../packages/rs/apparch/g3rs-apparch-ingestion" }
g3rs-apparch-source-checks = { path = "../../packages/rs/apparch/g3rs-apparch-source-checks" }

g3rs-arch-config-checks = { path = "../../packages/rs/arch/g3rs-arch-config-checks", features = ["api"] }
g3rs-arch-file-tree-checks = { path = "../../packages/rs/arch/g3rs-arch-file-tree-checks", features = ["api"] }
g3rs-arch-hook-contract = { path = "../../packages/rs/arch/g3rs-arch-hook-contract" }
g3rs-arch-ingestion = { path = "../../packages/rs/arch/g3rs-arch-ingestion", features = ["api"] }
g3rs-arch-source-checks = { path = "../../packages/rs/arch/g3rs-arch-source-checks", features = ["api"] }

g3rs-cargo-config-checks = { path = "../../packages/rs/cargo/g3rs-cargo-config-checks", features = ["api"] }
