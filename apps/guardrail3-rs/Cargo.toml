g3rs-toolchain-config-checks = { path = "../../packages/rs/toolchain/g3rs-toolchain-config-checks", features = ["api"] }
g3rs-toolchain-filetree-checks = { path = "../../packages/rs/toolchain/g3rs-toolchain-filetree-checks", features = ["api"] }
