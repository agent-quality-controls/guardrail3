[[waivers]]
rule = "g3rs-arch/dependency-count-split"
subject = "crates/logic/family-runner-config/Cargo.toml"
selector = "dependency-count"
reason = "The TS config runner intentionally composes explicit config-family packages. Keeping family packages visible here is clearer than hiding them behind an aggregate facade."

[[waivers]]
rule = "g3rs-arch/dependency-count-split"
subject = "crates/logic/family-runner-structure/Cargo.toml"
selector = "dependency-count"
reason = "The TS structure runner intentionally composes explicit structure-family packages. Astro setup, content, MDX, SEO, and state dependencies stay visible here instead of being hidden behind an aggregate Astro facade."

[[waivers]]
rule = "g3rs-arch/dependency-count-split"
subject = "crates/logic/family-runner-hooks/crates/runtime/Cargo.toml"
selector = "dependency-count"
reason = "The TS hooks runner intentionally composes explicit hook contracts from each owning family. Hook requirements stay visible here instead of being hidden behind an aggregate Astro facade."
