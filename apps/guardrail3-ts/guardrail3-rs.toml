  "g3ts-astro-media-config-checks",
  "g3ts-astro-media-hook-contract",
  "g3ts-astro-media-ingestion",
  "g3ts-astro-mdx-config-checks",
  "g3ts-astro-mdx-hook-contract",
  "g3ts-astro-mdx-ingestion",
  "g3ts-astro-seo-config-checks",
  "g3ts-astro-seo-hook-contract",
  "g3ts-astro-seo-ingestion",
  "g3ts-astro-setup-config-checks",
  "g3ts-astro-setup-file-tree-checks",
  "g3ts-astro-setup-hook-contract",
  "g3ts-astro-setup-ingestion",
  "g3ts-astro-state-file-tree-checks",
  "g3ts-astro-state-ingestion",
  "g3ts-eslint-config-checks",
  "g3ts-eslint-ingestion",
  "g3ts-fmt-config-checks",
  "g3ts-fmt-hook-contract",
  "g3ts-fmt-ingestion",
  "g3ts-spelling-config-checks",
  "g3ts-spelling-hook-contract",
  "g3ts-spelling-ingestion",
  "g3ts-typecov-config-checks",
  "g3ts-typecov-hook-contract",
  "g3ts-typecov-ingestion",
  "g3ts-arch-config-checks",
  "g3ts-arch-file-tree-checks",
  "g3ts-arch-ingestion",
  "g3ts-arch-source-checks",
  "g3ts-apparch-config-checks",
  "g3ts-apparch-ingestion",
  "g3ts-apparch-source-checks",
  "g3ts-tsconfig-config-checks",
  "g3ts-tsconfig-ingestion",
  "g3ts-package-config-checks",
  "g3ts-package-ingestion",
  "g3ts-npmrc-config-checks",
  "g3ts-npmrc-ingestion",
  "g3ts-jscpd-config-checks",
