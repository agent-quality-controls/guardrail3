[package]
name = "guardrail3-app-rs-legacy-validate"
version = "0.0.0"
edition = "2024"

[lib]
path = "mod.rs"

[lints.rust]
warnings = "deny"
unsafe_code = "forbid"
dead_code = "deny"
unused_results = "deny"
unused_crate_dependencies = "deny"
missing_debug_implementations = "deny"

[lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
cargo = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
unimplemented = "deny"
todo = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"
disallowed_methods = "deny"
disallowed_macros = "deny"
disallowed_types = "deny"
indexing_slicing = "deny"
string_slice = "deny"
arithmetic_side_effects = "deny"
shadow_unrelated = "deny"
missing_assert_message = "deny"
partial_pub_fields = "deny"
str_to_string = "deny"
implicit_clone = "deny"
as_conversions = "deny"
float_cmp = "deny"
lossy_float_literal = "deny"
wildcard_enum_match_arm = "deny"
rest_pat_in_fully_bound_structs = "deny"
large_stack_arrays = "deny"
needless_pass_by_value = "deny"
redundant_else = "deny"
large_futures = "deny"
semicolon_if_nothing_returned = "deny"
redundant_closure_for_method_calls = "deny"
map_unwrap_or = "deny"
verbose_file_reads = "deny"
missing_docs_in_private_items = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
option_if_let_else = "allow"
empty_line_after_doc_comments = "allow"
single_match_else = "allow"
ref_option_ref = "allow"
trivially_copy_pass_by_ref = "allow"
multiple_crate_versions = "allow"

[dependencies]
guardrail3_app_hexarch_helpers = { package = "guardrail3-app-hexarch-helpers", path = "../../../hexarch-helpers" }
guardrail3_app_core = { package = "guardrail3-app-core", path = "../../../core" }
guardrail3_app_hooks = { package = "guardrail3-app-hooks", path = "../../../hooks" }
guardrail3_app_rs_ast = { package = "guardrail3-app-rs-ast", path = "../../ast" }
guardrail3_app_rs_family_clippy = { package = "guardrail3-app-rs-family-clippy", path = "../../families/clippy/crates/runtime" }
guardrail3_app_rs_family_deny = { package = "guardrail3-app-rs-family-deny", path = "../../families/deny/crates/runtime" }
guardrail3_domain_config = { package = "guardrail3-domain-config", path = "../../../../domain/config" }
guardrail3_domain_report = { package = "guardrail3-domain-report", path = "../../../../domain/report" }
guardrail3_outbound_traits = { package = "guardrail3-ports-outbound-traits", path = "../../../../ports/outbound/traits" }
syn = { version = "2", features = ["full", "parsing", "visit"] }
toml = "0.8"
walkdir = "2"
