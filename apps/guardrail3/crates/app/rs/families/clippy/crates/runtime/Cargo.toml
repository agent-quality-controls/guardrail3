[package]
name = "guardrail3-app-rs-family-clippy"
version = "0.0.0"
edition = "2024"

[lints]
workspace = true

[features]
default = ["all"]
all = ["api"]
api = []

[dependencies]
clippy-toml-parser = { path = "../../../../../../../../../packages/parsers/clippy-toml-parser" }
g3rs-clippy-config-checks = { path = "../../../../../../../../../packages/rs/clippy/g3rs-clippy-config-checks" }
guardrail3_app_core = { package = "guardrail3-app-core", path = "../../../../../core" }
guardrail3_app_rs_family_mapper = { package = "guardrail3-app-rs-family-mapper", path = "../../../../family_mapper" }
guardrail3_app_rs_family_view = { package = "guardrail3-app-rs-family-view", path = "../../../../family_view" }
guardrail3_app_rs_ownership = { package = "guardrail3-app-rs-ownership", path = "../../../../ownership" }
guardrail3_check_types = { package = "guardrail3-check-types", path = "../../../../../../../../../packages/shared/guardrail3-check-types/crates/guardrail3-check-types" }
guardrail3_domain_modules = { package = "guardrail3-domain-modules", path = "../../../../../../domain/modules" }
guardrail3_domain_report = { package = "guardrail3-domain-report", path = "../../../../../../domain/report" }
guardrail3_reason_policy = { package = "guardrail3-reason-policy", path = "../../../../../../../../../packages/shared/reason-policy/crates/reason-policy" }
toml = "0.8"

[dev-dependencies]
guardrail3_app_rs_legality = { package = "guardrail3-app-rs-legality", path = "../../../../legality" }
guardrail3_domain_project_tree = { package = "guardrail3-domain-project-tree", path = "../../../../../../domain/project-tree" }
guardrail3_app_rs_structure = { package = "guardrail3-app-rs-structure", path = "../../../../structure" }
guardrail3_adapters_outbound_fs = { package = "guardrail3-adapters-outbound-fs", path = "../../../../../../adapters/outbound/fs" }
guardrail3_validation_model = { package = "guardrail3-domain-validation-model", path = "../../../../../../domain/validation-model" }
"guardrail3-app-rs-family-clippy-assertions" = { path = "../assertions" }
test_support = { package = "guardrail3-app-rs-family-clippy-test-support", path = "../../test_support" }
