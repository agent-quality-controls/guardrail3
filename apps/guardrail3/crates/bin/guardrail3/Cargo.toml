[package]
name = "guardrail3"
version = "0.2.0"
edition = "2024"
rust-version = "1.85"
description = "Composable code guardrails for Rust and TypeScript projects"
license = "MIT"
repository = "https://github.com/websmasher/guardrail3"
readme = "../../../README.md"
keywords = ["guardrails", "linting", "clippy", "rust", "typescript"]
categories = ["development-tools", "command-line-utilities"]

[[bin]]
name = "guardrail3"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
clap = { version = "4", features = ["derive"] }
garde = { workspace = true }
serde_json = "1"
toml = "0.8"
guardrail3_adapters_inbound_cli = { package = "guardrail3-adapters-inbound-cli", path = "../../adapters/inbound/cli" }
guardrail3_adapters_outbound_fs = { package = "guardrail3-adapters-outbound-fs", path = "../../adapters/outbound/fs" }
guardrail3_adapters_outbound_report = { package = "guardrail3-adapters-outbound-report", path = "../../adapters/outbound/report" }
guardrail3_adapters_outbound_tool_runner = { package = "guardrail3-adapters-outbound-tool-runner", path = "../../adapters/outbound/tool-runner" }
guardrail3_app_commands = { package = "guardrail3-app-commands", path = "../../app/commands" }
guardrail3_app_core = { package = "guardrail3-app-core", path = "../../app/core" }
guardrail3_app_hooks = { package = "guardrail3-app-hooks", path = "../../app/hooks" }
guardrail3_app_rs_runtime = { package = "guardrail3-app-rs-runtime", path = "../../app/rs" }
guardrail3_app_ts = { package = "guardrail3-app-ts", path = "../../app/ts" }
guardrail3_domain_config = { package = "guardrail3-domain-config", path = "../../domain/config" }
guardrail3_domain_report = { package = "guardrail3-domain-report", path = "../../domain/report" }
guardrail3_outbound_traits = { package = "guardrail3-ports-outbound-traits", path = "../../ports/outbound/traits" }
guardrail3_shared_fs = { package = "guardrail3-shared-fs", path = "../../shared/fs" }

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/{ name }-{ target }{ archive-suffix }"
bin-dir = "{ bin }{ binary-ext }"
pkg-fmt = "tgz"
